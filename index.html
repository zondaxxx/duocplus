<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#131f24">
<title>C++ Hero — подготовка к экзамену за 7 дней</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg: #131f24; --bg2: #1b2b33; --card: #202f36; --line: #37464f;
  --txt: #f1f7fb; --mut: #8da6b3;
  --green: #58cc02; --green-d: #46a302; --red: #ff4b4b; --red-d: #d33131;
  --blue: #1cb0f6; --gold: #ffc800; --purple: #ce82ff;
  --r: 16px;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: 'Nunito', -apple-system, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--txt);
  font-size: 17px; line-height: 1.45;
  overscroll-behavior-y: none;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
#wrap { max-width: 560px; margin: 0 auto; min-height: 100%; position: relative; }
#app { padding-bottom: 90px; }

/* ===== верхняя панель ===== */
.topbar {
  position: sticky; top: 0; z-index: 30; display: flex; justify-content: space-around;
  padding: 12px 16px; background: rgba(19,31,36,.92); backdrop-filter: blur(8px);
  border-bottom: 2px solid var(--line); font-weight: 900; font-size: 18px;
}
.topbar span { display: flex; align-items: center; gap: 6px; }
.stat-fire { color: #ff9600; } .stat-xp { color: var(--gold); } .stat-day { color: var(--blue); }

/* ===== путь ===== */
.unit-head {
  margin: 24px 12px 8px; border-radius: var(--r); padding: 18px 20px; color: #fff;
  box-shadow: 0 4px 0 rgba(0,0,0,.25);
}
.unit-head h2 { font-size: 21px; font-weight: 900; }
.unit-head p { font-size: 14px; opacity: .92; margin-top: 2px; font-weight: 700; }
.unit-head .day-tag { font-size: 13px; font-weight: 900; text-transform: uppercase; letter-spacing: .5px; opacity: .85; }
.path { display: flex; flex-direction: column; align-items: center; padding: 10px 0 6px; }
.node-row { display: flex; justify-content: center; width: 100%; }
.node {
  width: 72px; height: 72px; border-radius: 50%; margin: 10px 0;
  display: flex; align-items: center; justify-content: center; font-size: 30px;
  position: relative; transition: transform .1s;
  background: var(--card); box-shadow: 0 6px 0 #0e161a; border: none;
}
.node:active { transform: translateY(4px); box-shadow: 0 2px 0 #0e161a; }
.node.locked { filter: grayscale(1); opacity: .45; }
.node.done { background: var(--c, var(--green)); box-shadow: 0 6px 0 rgba(0,0,0,.35); }
.node.active { background: var(--c, var(--green)); box-shadow: 0 6px 0 rgba(0,0,0,.35); animation: bounce 1.6s infinite; margin-top: 40px; }
.node.active::after {
  content: 'НАЧАТЬ'; position: absolute; top: -34px; left: 50%; transform: translateX(-50%);
  background: #fff; color: var(--c, var(--green)); font-size: 12px; font-weight: 900;
  padding: 4px 10px; border-radius: 10px; white-space: nowrap; letter-spacing: 1px;
  animation: float 1.6s infinite;
}
.node .check { position: absolute; bottom: -2px; right: -2px; background: #fff; color: var(--green-d);
  width: 26px; height: 26px; border-radius: 50%; font-size: 15px; display: flex; align-items: center; justify-content: center; font-weight: 900; }
@keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
@keyframes float { 0%,100% { transform: translate(-50%,0); } 50% { transform: translate(-50%,-4px); } }
.node-label { font-size: 13px; color: var(--mut); font-weight: 800; text-align: center; margin-top: -6px; max-width: 130px; }

/* ===== нижняя навигация ===== */
#nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 560px; z-index: 40;
  display: flex; justify-content: space-around; padding: 8px 0 max(10px, env(safe-area-inset-bottom));
  background: var(--bg); border-top: 2px solid var(--line);
}
#nav button { font-size: 26px; padding: 6px 18px; border-radius: 12px; opacity: .55; }
#nav button.cur { opacity: 1; background: rgba(28,176,246,.12); outline: 2px solid var(--blue); }
body.inlesson #nav { display: none; }

/* ===== модалки ===== */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 50; display: flex; align-items: flex-end; justify-content: center; }
.sheet {
  background: var(--bg2); width: 100%; max-width: 560px; border-radius: 24px 24px 0 0;
  padding: 24px 20px max(24px, env(safe-area-inset-bottom)); max-height: 86vh; overflow-y: auto;
  animation: up .22s ease-out;
}
@keyframes up { from { transform: translateY(60px); opacity: 0; } to { transform: none; opacity: 1; } }
.sheet h3 { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
.sheet .sub { color: var(--mut); font-weight: 700; margin-bottom: 16px; }

/* ===== кнопки ===== */
.btn {
  display: block; width: 100%; padding: 14px; border-radius: 14px;
  font-size: 17px; font-weight: 900; text-transform: uppercase; letter-spacing: .8px;
  background: var(--green); color: #fff; box-shadow: 0 4px 0 var(--green-d);
  transition: transform .07s, box-shadow .07s, filter .15s; text-align: center;
}
.btn:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--green-d); }
.btn.blue { background: var(--blue); box-shadow: 0 4px 0 #1389c4; }
.btn.ghost { background: transparent; color: var(--blue); box-shadow: none; border: 2px solid var(--line); }
.btn.red { background: var(--red); box-shadow: 0 4px 0 var(--red-d); }
.btn:disabled { background: var(--card); color: var(--mut); box-shadow: 0 4px 0 #0e161a; cursor: default; }
.btn + .btn { margin-top: 12px; }

/* ===== урок ===== */
.lesson-top { display: flex; align-items: center; gap: 12px; padding: 14px 16px 6px; }
.lesson-top .quit { font-size: 22px; color: var(--mut); padding: 4px 8px; }
.pbar { flex: 1; height: 14px; background: var(--card); border-radius: 8px; overflow: hidden; }
.pbar > div { height: 100%; background: var(--green); border-radius: 8px; width: 0; transition: width .35s; position: relative; }
.pbar > div::after { content: ''; position: absolute; top: 3px; left: 8px; right: 8px; height: 4px; border-radius: 2px; background: rgba(255,255,255,.3); }
.hearts { font-weight: 900; font-size: 17px; color: var(--red); display: flex; gap: 3px; align-items: center; }
.exwrap { padding: 18px 16px 140px; }
.extitle { font-size: 21px; font-weight: 900; margin-bottom: 14px; }
pre.code {
  background: #0d1418; border: 2px solid var(--line); border-radius: 12px;
  padding: 12px 14px; overflow-x: auto; font-size: 13.5px; line-height: 1.5;
  font-family: 'SF Mono', Menlo, Consolas, monospace; margin-bottom: 14px; white-space: pre;
}
.tok-k { color: #ff79b8; } .tok-s { color: #ffd866; } .tok-c { color: #6f8a96; } .tok-n { color: #8be9fd; }
code.inline { background: #0d1418; border: 1px solid var(--line); border-radius: 6px; padding: 1px 6px; font-family: Menlo, Consolas, monospace; font-size: .88em; }

.opt {
  display: block; width: 100%; text-align: left; padding: 13px 16px; margin-bottom: 10px;
  background: var(--card); border: 2px solid var(--line); border-bottom-width: 4px; border-radius: 14px;
  font-size: 16px; font-weight: 700; transition: all .12s; color: var(--txt);
}
.opt:active { transform: translateY(2px); border-bottom-width: 2px; }
.opt.sel { border-color: var(--blue); background: rgba(28,176,246,.14); color: var(--blue); }
.opt.good { border-color: var(--green); background: rgba(88,204,2,.15); color: #a8ff6b; }
.opt.bad { border-color: var(--red); background: rgba(255,75,75,.15); color: #ff9c9c; }

/* пары */
.match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.mopt { padding: 12px 10px; min-height: 58px; display: flex; align-items: center; justify-content: center; text-align: center;
  background: var(--card); border: 2px solid var(--line); border-bottom-width: 4px; border-radius: 14px; font-size: 14.5px; font-weight: 700; transition: all .12s; }
.mopt.sel { border-color: var(--blue); color: var(--blue); background: rgba(28,176,246,.14); }
.mopt.off { opacity: .28; pointer-events: none; border-color: var(--green); }
.mopt.shake { animation: shake .3s; border-color: var(--red); }
.shake { animation: shake .3s; }
@keyframes shake { 0%,100% { transform: none; } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

/* порядок и пропуски */
.slots { min-height: 56px; border-bottom: 2px solid var(--line); display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 2px; margin-bottom: 18px; }
.bank { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.tokenbtn { padding: 10px 14px; background: var(--card); border: 2px solid var(--line); border-bottom-width: 4px;
  border-radius: 12px; font-size: 15px; font-weight: 800; transition: all .1s; }
.tokenbtn:active { transform: translateY(2px); }
.tokenbtn.used { opacity: .25; pointer-events: none; }
.fill-q { font-size: 18px; font-weight: 700; margin-bottom: 18px; line-height: 2; }
.gap { display: inline-block; min-width: 110px; border-bottom: 3px solid var(--mut); text-align: center; font-weight: 900; color: var(--gold); padding: 0 6px; }

/* футер проверки */
.checkbar {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 560px;
  padding: 16px 16px max(20px, env(safe-area-inset-bottom)); background: var(--bg); border-top: 2px solid var(--line); z-index: 45;
}
.checkbar.ok { background: #122e18; border-color: #1d4a26; }
.checkbar.no { background: #331417; border-color: #582025; }
.fb { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 12px; }
.fb .fico { font-size: 30px; line-height: 1; }
.fb b { font-size: 19px; display: block; }
.fb .ok-t { color: #7dff5e; } .fb .no-t { color: #ff9c9c; }
.fb p { font-size: 14.5px; color: var(--txt); opacity: .9; margin-top: 3px; }

/* теория */
.theory { font-size: 15.5px; }
.theory p { margin-bottom: 10px; }
.theory table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 13.5px; }
.theory th, .theory td { border: 1px solid var(--line); padding: 6px 8px; text-align: left; }
.theory th { background: var(--card); }

/* конец урока */
.endscr { text-align: center; padding: 70px 24px 40px; }
.endscr .big { font-size: 64px; margin-bottom: 8px; }
.endscr h2 { font-size: 26px; font-weight: 900; color: var(--gold); margin-bottom: 24px; }
.endcards { display: flex; gap: 10px; justify-content: center; margin-bottom: 34px; }
.endcard { border-radius: 14px; padding: 2px; min-width: 100px; font-weight: 900; }
.endcard .in { background: var(--bg); margin: 2px; border-radius: 12px; padding: 12px 8px; }
.endcard small { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
.confetti { position: fixed; top: -30px; font-size: 22px; z-index: 60; animation: fall linear forwards; pointer-events: none; }
@keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: .4; } }

/* списки (билеты, профиль) */
.page { padding: 18px 16px; }
.page h1 { font-size: 24px; font-weight: 900; margin-bottom: 4px; }
.page .sub { color: var(--mut); font-weight: 700; margin-bottom: 18px; font-size: 15px; }
.ticket { display: flex; gap: 12px; align-items: flex-start; background: var(--card); border: 2px solid var(--line);
  border-radius: 14px; padding: 12px 14px; margin-bottom: 10px; font-weight: 700; font-size: 15px; }
.ticket .num { color: var(--mut); font-weight: 900; min-width: 26px; }
.ticket.done { border-color: var(--green); }
.ticket.done .tx { color: var(--mut); text-decoration: line-through; }
.ticket input { width: 22px; height: 22px; accent-color: var(--green); margin-top: 2px; flex: none; }
.statgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
.statcard { background: var(--card); border: 2px solid var(--line); border-radius: 16px; padding: 16px; }
.statcard .v { font-size: 26px; font-weight: 900; }
.statcard .l { font-size: 13px; color: var(--mut); font-weight: 800; text-transform: uppercase; letter-spacing: .5px; }

/* карточка повторения на главной */
.srs-card { margin: 14px 12px 0; border-radius: var(--r); padding: 16px 18px; background: linear-gradient(120deg,#7e3ff2,#b14bff); color:#fff; box-shadow: 0 4px 0 rgba(0,0,0,.3); display:flex; align-items:center; gap:14px; }
.srs-card .ic { font-size: 34px; }
.srs-card .tx b { font-size: 17px; font-weight: 900; display:block; }
.srs-card .tx span { font-size: 13px; opacity:.92; font-weight:700; }
.srs-card .go { margin-left:auto; background:#fff; color:#8a2be2; font-weight:900; padding:9px 14px; border-radius:12px; font-size:13px; white-space:nowrap; }

/* карточки на вкладке «Код» */
.codecard { display:flex; gap:12px; align-items:flex-start; background: var(--card); border:2px solid var(--line); border-bottom-width:4px; border-radius:14px; padding:14px; margin-bottom:11px; text-align:left; width:100%; transition:transform .1s; }
.codecard:active { transform: translateY(2px); }
.codecard.solved { border-color: var(--green); }
.codecard .cic { font-size:26px; flex:none; }
.codecard .ct b { font-size:16px; font-weight:900; display:block; margin-bottom:2px; }
.codecard .ct span { font-size:13.5px; color:var(--mut); font-weight:700; }
.codecard .cdone { margin-left:auto; color:var(--green); font-weight:900; font-size:18px; flex:none; }

/* редактор кода */
.editor-wrap { padding: 14px 14px 160px; }
.editor-q { font-size:16px; font-weight:700; margin-bottom:12px; line-height:1.5; }
textarea.editor {
  width:100%; min-height:230px; background:#0d1418; color:#e6f0f5; border:2px solid var(--line);
  border-radius:12px; padding:12px 14px; font-family:'SF Mono',Menlo,Consolas,monospace;
  font-size:13px; line-height:1.55; resize:vertical; white-space:pre; tab-size:4; -moz-tab-size:4;
  outline:none; caret-color: var(--green);
}
textarea.editor:focus { border-color: var(--blue); }
.run-out {
  margin-top:12px; background:#0a0f12; border:2px solid var(--line); border-radius:12px;
  padding:11px 14px; font-family:'SF Mono',Menlo,Consolas,monospace; font-size:12.5px; line-height:1.5;
  white-space:pre-wrap; word-break:break-word; min-height:46px; color:#cfe3ec;
}
.run-out.err { border-color: var(--red); color:#ffb4b4; }
.run-out.good { border-color: var(--green); color:#bff59a; }
.run-label { font-size:12px; color:var(--mut); font-weight:800; text-transform:uppercase; letter-spacing:.6px; margin:14px 2px 6px; }
.editor-bar { position: fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:560px; padding:14px 14px max(18px,env(safe-area-inset-bottom)); background:var(--bg); border-top:2px solid var(--line); z-index:45; display:flex; gap:10px; }
.editor-bar .btn { margin:0; }
.spin { display:inline-block; animation: spin 0.9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="wrap"><div id="app"></div></div>
<nav id="nav">
  <button data-tab="home" title="Путь">🛤️</button>
  <button data-tab="code" title="Код">🧪</button>
  <button data-tab="exam" title="Экзамен">🎓</button>
  <button data-tab="tickets" title="Билеты">📋</button>
  <button data-tab="me" title="Профиль">👤</button>
</nav>
<script src="data.js"></script>
<script>
'use strict';
/* ================== Telegram Mini App ================== */
const TG = (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) ? window.Telegram.WebApp : null;
let syncState = TG ? 'connecting' : 'off'; // off | connecting | ok | error
if (TG) {
  try { TG.ready(); TG.expand(); TG.setHeaderColor('#131f24'); TG.setBackgroundColor('#131f24'); } catch (e) {}
  try { if (TG.disableVerticalSwipes) TG.disableVerticalSwipes(); } catch (e) {}
}
function tgHeaders(extra) {
  return Object.assign(TG ? { 'Authorization': 'tma ' + TG.initData } : {}, extra || {});
}
function mergeProgress(a, b) { // объединение локального и серверного прогресса
  if (!b || typeof b !== 'object') return a;
  const out = JSON.parse(JSON.stringify(a));
  out.xp = Math.max(a.xp || 0, b.xp || 0);
  out.streak = Math.max(a.streak || 0, b.streak || 0);
  out.bestExam = Math.max(a.bestExam || 0, b.bestExam || 0);
  out.examCount = Math.max(a.examCount || 0, b.examCount || 0);
  out.unlockAll = !!(a.unlockAll || b.unlockAll);
  const da = a.lastDay ? new Date(a.lastDay) : 0, db = b.lastDay ? new Date(b.lastDay) : 0;
  out.lastDay = (da > db) ? a.lastDay : (b.lastDay || a.lastDay || '');
  out.done = Object.assign({}, b.done, a.done);
  out.perfect = Object.assign({}, b.perfect, a.perfect);
  out.tickets = Object.assign({}, b.tickets, a.tickets);
  out.codeDone = Object.assign({}, b.codeDone, a.codeDone);
  // SRS: для каждой карточки берём запись с более свежим last
  out.srs = Object.assign({}, b.srs);
  for (const g in (a.srs || {})) {
    const ea = a.srs[g], eb = (b.srs || {})[g];
    out.srs[g] = (!eb || (ea.last || 0) >= (eb.last || 0)) ? ea : eb;
  }
  return out;
}
let syncTimer = null;
function scheduleSync() {
  if (!TG) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(pushProgress, 1200);
}
async function pushProgress() {
  if (!TG) return;
  try {
    const r = await fetch('/api/progress', { method: 'POST', headers: tgHeaders({ 'Content-Type': 'application/json' }), body: JSON.stringify(S) });
    syncState = r.ok ? 'ok' : 'error';
  } catch (e) { syncState = 'error'; }
}
async function pullProgress() {
  if (!TG) return;
  try {
    const r = await fetch('/api/progress', { headers: tgHeaders() });
    if (!r.ok) { syncState = 'error'; return; }
    const j = await r.json();
    if (j.progress) { S = mergeProgress(S, j.progress); save(); }
    syncState = 'ok';
    render();
  } catch (e) { syncState = 'error'; }
}
// отправка прогресса при сворачивании мини-аппа
window.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden' && TG) {
    try { navigator.sendBeacon('/api/progress', new Blob([JSON.stringify({ initData: TG.initData, progress: S })], { type: 'application/json' })); } catch (e) {}
  }
});

/* ================== состояние ================== */
const KEY = 'cppduo_v1';
let S = load();
function load() {
  const base = { xp: 0, streak: 0, lastDay: '', done: {}, perfect: {}, tickets: {}, unlockAll: false, bestExam: 0, examCount: 0, srs: {}, codeDone: {} };
  try { const s = JSON.parse(localStorage.getItem(KEY)); if (s && s.done) return Object.assign(base, s, { srs: s.srs || {}, codeDone: s.codeDone || {} }); } catch(e) {}
  return base;
}
function save() { try { localStorage.setItem(KEY, JSON.stringify(S)); } catch(e) {} scheduleSync(); }

const ALL_LESSONS = [];
COURSE.forEach(u => u.lessons.forEach(l => ALL_LESSONS.push({ u, l })));
function lessonIndex(id) { return ALL_LESSONS.findIndex(x => x.l.id === id); }

/* ---- стабильные ID упражнений + индекс для интервальных повторений ---- */
const EX_BY_ID = {};
COURSE.forEach(u => u.lessons.forEach(l => l.ex.forEach((e, i) => {
  e._gid = l.id + '#' + i;
  e._lesson = l.title;
  EX_BY_ID[e._gid] = e;
})));

// SM-2-lite: интервалы в днях по числу успешных повторов подряд
const SRS_STEPS = [1, 2, 4, 8, 16, 30];
function srsLapse(gid) { // ошибка: карточка снова «горит»
  const e = S.srs[gid] || { reps: 0, lapses: 0 };
  e.reps = 0; e.lapses = (e.lapses || 0) + 1;
  e.due = Date.now(); e.last = Date.now();
  S.srs[gid] = e; save();
}
function srsAdvance(gid) { // верный ответ: отодвигаем повтор дальше
  const e = S.srs[gid]; if (!e) return;
  const days = SRS_STEPS[Math.min(e.reps || 0, SRS_STEPS.length - 1)];
  e.reps = (e.reps || 0) + 1;
  e.due = Date.now() + days * 86400000; e.last = Date.now();
  S.srs[gid] = e; save();
}
function dueIds() {
  const now = Date.now();
  return Object.keys(S.srs).filter(g => EX_BY_ID[g] && (S.srs[g].due || 0) <= now);
}
function weakCount() { return dueIds().length; }
function isUnlocked(id) {
  if (S.unlockAll) return true;
  const i = lessonIndex(id);
  return i === 0 || !!S.done[ALL_LESSONS[i-1].l.id];
}
function doneCount() { return ALL_LESSONS.filter(x => S.done[x.l.id]).length; }

/* ================== утилиты ================== */
const app = document.getElementById('app');
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(s) { // инлайн-разметка: `код`, **жирный**
  return esc(s).replace(/`([^`]+)`/g, '<code class="inline">$1</code>').replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>');
}
function hl(code) { // подсветка C++
  let t = esc(code);
  const hold = [];
  t = t.replace(/(\/\/[^\n]*)|(&quot;.*?&quot;|"[^"]*")|('[^']*')/g, m => {
    hold.push(m.startsWith('//') ? '<span class="tok-c">'+m+'</span>' : '<span class="tok-s">'+m+'</span>');
    return '\u0001' + (hold.length-1) + '\u0001';
  });
  t = t.replace(/\b(class|struct|public|private|protected|virtual|override|final|explicit|template|typename|concept|requires|using|namespace|friend|operator|const|constexpr|static|inline|return|if|else|for|while|do|new|delete|try|catch|throw|noexcept|this|true|false|nullptr|default|sizeof|enum|switch|case|break|continue)\b/g, '<span class="tok-k">$1</span>');
  t = t.replace(/\b(int|double|float|char|void|bool|auto|size_t|long|short|unsigned)\b/g, '<span class="tok-n">$1</span>');
  t = t.replace(/\u0001(\d+)\u0001/g, (m, i) => hold[+i]);
  return t;
}
function theoryHTML(md) {
  const parts = String(md).split('```');
  let out = '';
  parts.forEach((p, i) => {
    if (i % 2 === 1) { out += '<pre class="code">' + hl(p.replace(/^\n|\n$/g,'')) + '</pre>'; return; }
    const lines = p.split('\n'); let tbl = [];
    const flushT = () => {
      if (!tbl.length) return;
      out += '<table>' + tbl.map((r, ri) => {
        const cells = r.split('|').slice(1, -1).map(c => c.trim()).filter((c,ci,arr) => true);
        if (cells.every(c => /^-+$/.test(c))) return '';
        const tag = ri === 0 ? 'th' : 'td';
        return '<tr>' + cells.map(c => `<${tag}>${fmt(c)}</${tag}>`).join('') + '</tr>';
      }).join('') + '</table>'; tbl = [];
    };
    let para = [];
    const flushP = () => { if (para.length) { out += '<p>' + para.map(fmt).join('<br>') + '</p>'; para = []; } };
    lines.forEach(ln => {
      if (ln.trim().startsWith('|')) { flushP(); tbl.push(ln.trim()); }
      else if (ln.trim() === '') { flushT(); flushP(); }
      else { flushT(); para.push(ln); }
    });
    flushT(); flushP();
  });
  return '<div class="theory">' + out + '</div>';
}
function shuffle(a) { a = a.slice(); for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]] = [a[j],a[i]]; } return a; }
function vib(ms) { if (navigator.vibrate) navigator.vibrate(ms); }
function todayStr() { return new Date().toDateString(); }
function bumpStreak() {
  const t = todayStr();
  if (S.lastDay === t) return;
  const y = new Date(); y.setDate(y.getDate()-1);
  S.streak = (S.lastDay === y.toDateString()) ? S.streak + 1 : 1;
  S.lastDay = t;
}

function plural(n, one, few, many) {

}

/* ================== движок урока ================== */
let L = null; // текущая сессия
// mode: undefined='урок' | 'exam'='пробный экзамен' | 'review'='повторение слабого'
function startLesson(idOrObj, mode) {
  const isObj = typeof idOrObj === 'object';
  const l = isObj ? idOrObj : ALL_LESSONS[lessonIndex(idOrObj)].l;
  const exam = mode === 'exam', review = mode === 'review';
  L = {
    id: isObj ? '__' + (mode || 'session') + '__' : l.id,
    exam, review,
    queue: l.ex.map((e, i) => i),
    ex: l.ex,
    pos: 0, hearts: (exam || review) ? Infinity : 4,
    solved: new Set(), seenWrong: new Set(), firstTry: 0, mistakes: 0, answered: 0,
  };
  document.body.classList.add('inlesson');
  showExercise();
}
function startReview() {
  const ids = shuffle(dueIds()).slice(0, 15);
  if (!ids.length) { render(); return; }
  startLesson({ ex: ids.map(g => EX_BY_ID[g]) }, 'review');
}
function quitLesson() {
  if (confirm('Выйти? Прогресс этой сессии не сохранится.')) { L = null; render(); }
}
function progressPct() { return Math.round(L.solved.size / L.ex.length * 100); }

function showExercise() {
  if (L.pos >= L.queue.length) { finishLesson(); return; }
  const exi = L.queue[L.pos];
  const ex = L.ex[exi];
  const heartsHtml = L.exam ? `<span class="hearts">🎓</span>` :
    L.review ? `<span class="hearts">🧠</span>` :
    `<span class="hearts">❤️ ${L.hearts}</span>`;
  let body = '';
  if (ex.t === 'c' || ex.t === 'tf') body = renderChoice(ex);
  else if (ex.t === 'f') body = renderFill(ex);
  else if (ex.t === 'm') body = renderMatch(ex);
  else if (ex.t === 'o') body = renderOrder(ex);
  app.innerHTML = `
    <div class="lesson-top">
      <button class="quit" id="quit">✕</button>
      <div class="pbar"><div style="width:${progressPct()}%"></div></div>
      ${heartsHtml}
    </div>
    <div class="exwrap">${body}</div>
    <div class="checkbar" id="cbar">
      <button class="btn" id="check" disabled>Проверить</button>
    </div>`;
  document.getElementById('quit').onclick = quitLesson;
  bindExercise(ex);
  window.scrollTo(0, 0);
}

/* ---------- choice / truefalse ---------- */
function renderChoice(ex) {
  let opts, correct;
  if (ex.t === 'tf') { opts = ['Верно ✅','Неверно ❌']; correct = ex.a ? 0 : 1; L._map = [0,1]; }
  else {
    const idx = shuffle(ex.o.map((_, i) => i));
    L._map = idx; opts = idx.map(i => ex.o[i]); correct = idx.indexOf(ex.a);
  }
  L._correct = correct;
  return `<div class="extitle">${fmt(ex.q)}</div>
    ${ex.code ? `<pre class="code">${hl(ex.code)}</pre>` : ''}
    ${opts.map((o, i) => `<button class="opt" data-i="${i}">${fmt(o)}</button>`).join('')}`;
}
function bindChoice(ex) {
  let sel = -1;
  const btns = app.querySelectorAll('.opt');
  btns.forEach(b => b.onclick = () => {
    btns.forEach(x => x.classList.remove('sel'));
    b.classList.add('sel'); sel = +b.dataset.i;
    checkBtn().disabled = false;
  });
  checkBtn().onclick = () => {
    const ok = sel === L._correct;
    btns[L._correct].classList.add('good');
    if (!ok) btns[sel].classList.add('bad');
    btns.forEach(b => b.style.pointerEvents = 'none');
    feedback(ok, ex, ex.t === 'tf' ? (ex.a ? 'Верно' : 'Неверно') : ex.o[ex.a]);
  };
}

/* ---------- fill (пропуск) ---------- */
function renderFill(ex) {
  L._fill = null;
  const bank = shuffle(ex.bank);
  L._bank = bank;
  const q = fmt(ex.q).replace('___', '<span class="gap" id="gap">&nbsp;</span>');
  return `<div class="extitle">Заполни пропуск</div>
    <div class="fill-q">${q}</div>
    ${ex.code ? `<pre class="code">${hl(ex.code)}</pre>` : ''}
    <div class="bank">${bank.map((t, i) => `<button class="tokenbtn" data-i="${i}">${esc(t)}</button>`).join('')}</div>`;
}
function bindFill(ex) {
  const gap = document.getElementById('gap');
  const toks = app.querySelectorAll('.tokenbtn');
  toks.forEach(b => b.onclick = () => {
    toks.forEach(x => x.classList.remove('used'));
    b.classList.add('used');
    L._fill = L._bank[+b.dataset.i];
    gap.textContent = L._fill;
    checkBtn().disabled = false;
  });
  gap.onclick = () => { L._fill = null; gap.innerHTML = '&nbsp;'; toks.forEach(x => x.classList.remove('used')); checkBtn().disabled = true; };
  checkBtn().onclick = () => {
    const ok = L._fill === ex.a;
    gap.style.color = ok ? 'var(--green)' : 'var(--red)';
    feedback(ok, ex, ex.a);
  };
}

/* ---------- match (пары) ---------- */
function renderMatch(ex) {
  const left = shuffle(ex.pairs.map((p, i) => ({ t: p[0], i })));
  const right = shuffle(ex.pairs.map((p, i) => ({ t: p[1], i })));
  L._mleft = left; L._mright = right; L._msolved = 0; L._mwrong = false;
  const cells = [];
  for (let r = 0; r < left.length; r++) {
    cells.push(`<button class="mopt" data-side="l" data-p="${left[r].i}">${fmt(left[r].t)}</button>`);
    cells.push(`<button class="mopt" data-side="r" data-p="${right[r].i}">${fmt(right[r].t)}</button>`);
  }
  return `<div class="extitle">${fmt(ex.q)}</div><div class="match-grid">${cells.join('')}</div>`;
}
function bindMatch(ex) {
  let selL = null, selR = null;
  const all = app.querySelectorAll('.mopt');
  function tryMatch() {
    if (!selL || !selR) return;
    const a = selL, b = selR; selL = selR = null;
    if (a.dataset.p === b.dataset.p) {
      [a, b].forEach(x => { x.classList.remove('sel'); x.classList.add('off'); });
      L._msolved++;
      vib(10);
      if (L._msolved === ex.pairs.length) {
        feedback(!L._mwrong, ex, null, true); // пары: ошибка не отнимает сердце
      }
    } else {
      L._mwrong = true; L.mistakes++;
      [a, b].forEach(x => { x.classList.remove('sel'); x.classList.add('shake'); });
      vib(60);
      setTimeout(() => [a, b].forEach(x => x.classList.remove('shake')), 320);
    }
  }
  all.forEach(b => b.onclick = () => {
    const side = b.dataset.side;
    if (side === 'l') { if (selL) selL.classList.remove('sel'); selL = b; }
    else { if (selR) selR.classList.remove('sel'); selR = b; }
    b.classList.add('sel');
    tryMatch();
  });
  checkBtn().style.display = 'none';
}

/* ---------- order (порядок) ---------- */
function renderOrder(ex) {
  const bank = shuffle(ex.items.map((t, i) => ({ t, i })));
  L._obank = bank; L._osel = [];
  return `<div class="extitle">${fmt(ex.q)}</div>
    ${ex.code ? `<pre class="code">${hl(ex.code)}</pre>` : ''}
    <div class="slots" id="slots"></div>
    <div class="bank" id="obank">${bank.map((b, i) => `<button class="tokenbtn" data-i="${i}">${fmt(b.t)}</button>`).join('')}</div>`;
}
function bindOrder(ex) {
  const slots = document.getElementById('slots');
  const bank = document.getElementById('obank');
  function redraw() {
    slots.innerHTML = L._osel.map((s, k) => `<button class="tokenbtn" data-k="${k}">${k+1}. ${fmt(s.t)}</button>`).join('');
    slots.querySelectorAll('button').forEach(b => b.onclick = () => {
      const s = L._osel.splice(+b.dataset.k, 1)[0];
      bank.querySelector(`[data-i="${s.bi}"]`).classList.remove('used');
      redraw();
    });
    checkBtn().disabled = L._osel.length !== ex.items.length;
  }
  bank.querySelectorAll('button').forEach(b => b.onclick = () => {
    if (b.classList.contains('used')) return;
    b.classList.add('used');
    L._osel.push({ t: L._obank[+b.dataset.i].t, i: L._obank[+b.dataset.i].i, bi: +b.dataset.i });
    redraw();
  });
  checkBtn().onclick = () => {
    const ok = L._osel.every((s, k) => s.i === k);
    feedback(ok, ex, ex.items.map((t,i)=>`${i+1}. ${t}`).join('  →  '));
  };
  redraw();
}

function bindExercise(ex) {
  if (ex.t === 'c' || ex.t === 'tf') bindChoice(ex);
  else if (ex.t === 'f') bindFill(ex);
  else if (ex.t === 'm') bindMatch(ex);
  else if (ex.t === 'o') bindOrder(ex);
}
function checkBtn() { return document.getElementById('check'); }

/* ---------- проверка и фидбек ---------- */
function feedback(ok, ex, correctText, noHeart) {
  const exi = L.queue[L.pos];
  L.answered++;
  const bar = document.getElementById('cbar');
  if (ok) {
    L.solved.add(exi);
    if (!L.seenWrong.has(exi)) L.firstTry++;
    if (ex._gid && S.srs[ex._gid]) srsAdvance(ex._gid); // верный ответ отодвигает повтор
    vib(15);
    bar.className = 'checkbar ok';
    bar.innerHTML = `<div class="fb"><div class="fico">✅</div><div>
        <b class="ok-t">${['Отлично!','Верно!','Супер!','Именно так!','Красавчик!'][Math.floor(Math.random()*5)]}</b>
        ${ex.w ? `<p>${fmt(ex.w)}</p>` : ''}
      </div></div>
      <button class="btn" id="next">Дальше</button>`;
  } else {
    L.seenWrong.add(exi);
    if (!noHeart) L.mistakes++;
    if (!noHeart && !L.exam && !L.review) L.hearts--; // сердца теряем только в обычном уроке
    if (ex._gid) srsLapse(ex._gid); // ошибка ставит карточку в очередь повторений
    vib([60,40,60]);
    if (!L.exam) L.queue.push(exi); // повторим в конце урока/повторения (на экзамене второго шанса нет)
    bar.className = 'checkbar no';
    bar.innerHTML = `<div class="fb"><div class="fico">❌</div><div>
        <b class="no-t">Неверно</b>
        ${correctText ? `<p><b>Правильный ответ:</b> ${fmt(correctText)}</p>` : ''}
        ${ex.w ? `<p>${fmt(ex.w)}</p>` : ''}
      </div></div>
      <button class="btn ${L.hearts <= 0 && !L.exam ? 'red' : 'blue'}" id="next">${L.hearts <= 0 && !L.exam ? 'Сердечки кончились…' : 'Дальше'}</button>`;
    const hb = document.querySelector('.hearts');
    if (hb && !L.exam && !L.review) hb.textContent = '❤️ ' + Math.max(0, L.hearts);
  }
  // обновить прогресс-бар
  const pb = document.querySelector('.pbar > div');
  if (pb) pb.style.width = progressPct() + '%';
  document.getElementById('next').onclick = () => {
    if (L.hearts <= 0 && !L.exam && !L.review) { failLesson(); return; }
    L.pos++;
    showExercise();
  };
  window.scrollTo(0, document.body.scrollHeight);
}

function failLesson() {
  const id = L.id; L = null;

function finishLesson() {
  const perfect = L.mistakes === 0 && L.seenWrong.size === 0;
  const xp = 10 + (perfect ? 5 : 0);
  const acc = Math.round(L.firstTry / L.ex.length * 100);
  if (L.exam) { finishExam(acc); return; }
  if (L.review) { finishReview(acc); return; }
  const first = !S.done[L.id];
  S.done[L.id] = true;
  if (perfect) S.perfect[L.id] = true;
  S.xp += xp;
  bumpStreak();
  save();
  const id = L.id; L = null;
  app.innerHTML = `<div class="endscr">
    <div class="big">${perfect ? '🏅' : '🎉'}</div>
    <h2>Урок пройден!</h2>
    <div class="endcards">

      <div class="endcard" style="background:var(--green)"><div class="in"><small style="color:var(--green)">Точность</small>🎯 ${acc}%</div></div>
      <div class="endcard" style="background:#ff9600"><div class="in"><small style="color:#ff9600">Стрик</small>🔥 ${S.streak}</div></div>
    </div>
    ${perfect ? '<p style="color:var(--gold);font-weight:900;margin-bottom:20px">Без единой ошибки! +5 бонусных XP</p>' : ''}
    <button class="btn" id="cont">Продолжить</button>
  </div>`;
  confetti();
  document.getElementById('cont').onclick = () => render();
}
function confetti() {
  const em = ['🎉','⭐','✨','💚','🧩','🏆'];
  for (let i = 0; i < 24; i++) {
    const s = document.createElement('span');
    s.className = 'confetti'; s.textContent = em[i % em.length];
    s.style.left = Math.random()*100 + 'vw';
    s.style.animationDuration = (1.4 + Math.random()*1.6) + 's';
    s.style.animationDelay = (Math.random()*0.5) + 's';

  }

    <div class="sub">20 случайных вопросов со всего курса. Без сердечек — как на настоящем экзамене.</div>
    <div class="statgrid">
      <div class="statcard"><div class="v">${S.bestExam}%</div><div class="l">Лучший результат</div></div>
      <div class="statcard"><div class="v">${S.examCount}</div><div class="l">Попыток</div></div>
    </div>
    <button class="btn" id="go">Начать экзамен</button>
    <p style="color:var(--mut);font-size:14px;margin-top:16px;font-weight:700">
      💡 Совет: сдай пробник на 80%+ хотя бы два раза подряд — и на экзамене будет спокойно.</p>
  </div>`;
  document.getElementById('go').onclick = () => {
    const pool = [];
    COURSE.forEach(u => u.lessons.forEach(l => l.ex.forEach(e => pool.push(e))));
    const pick = shuffle(pool).slice(0, 20);
    startLesson({ ex: pick }, true);
  };
}
function finishExam(acc) {
  L = null;
  S.examCount++;
  const best = acc > S.bestExam;
  if (best) S.bestExam = acc;
  S.xp += acc >= 80 ? 20 : 10;
  bumpStreak();
  save();
  const verdict = acc >= 90 ? 'Блестяще! Ты готов(а) 🏆' : acc >= 75 ? 'Отлично, почти готов(а)!' : acc >= 50 ? 'Неплохо, но повтори слабые темы' : 'Стоит пройтись по урокам ещё раз';
  app.innerHTML = `<div class="endscr">
    <div class="big">${acc >= 75 ? '🏆' : acc >= 50 ? '💪' : '📚'}</div>
    <h2>${acc}%</h2>
    <p style="font-weight:900;font-size:19px;margin-bottom:8px">${verdict}</p>
    ${best && S.examCount > 1 ? '<p style="color:var(--gold);font-weight:900">Новый рекорд!</p>' : ''}
    <div class="endcards" style="margin-top:24px">
      <div class="endcard" style="background:var(--gold)"><div class="in"><small style="color:var(--gold)">Опыт</small>⚡ +${acc >= 80 ? 20 : 10} XP</div></div>
      <div class="endcard" style="background:var(--blue)"><div class="in"><small style="color:var(--blue)">Рекорд</small>🥇 ${S.bestExam}%</div></div>
    </div>
    <button class="btn" id="again">Ещё раз</button>
    <button class="btn ghost" id="home">На карту</button>
  </div>`;
  if (acc >= 75) confetti();
  document.getElementById('again').onclick = () => { TAB = 'exam'; render(); };
  document.getElementById('home').onclick = () => { TAB = 'home'; render(); };
}
function finishReview(acc) {
  const n = L.ex.length; L = null;
  S.xp += 8; bumpStreak(); save();
  const left = weakCount();
  app.innerHTML = `<div class="endscr">
    <div class="big">🧠</div>
    <h2>Повторение пройдено!</h2>
    <p style="font-weight:900;font-size:18px;margin-bottom:6px">${n} ${plural(n, 'карточка закреплена', 'карточки закреплены', 'карточек закреплено')}</p>
    <div class="endcards" style="margin-top:20px">
      <div class="endcard" style="background:var(--gold)"><div class="in"><small style="color:var(--gold)">Опыт</small>⚡ +8 XP</div></div>
      <div class="endcard" style="background:var(--purple)"><div class="in"><small style="color:var(--purple)">Осталось</small>🧠 ${left}</div></div>
    </div>
    <p style="color:var(--mut);font-size:13.5px;margin:16px 24px 24px;font-weight:700">Карточки вернутся на повтор через 1 → 2 → 4 → 8 дней. Чем чаще отвечаешь верно — тем реже видишь.</p>
    ${left > 0 ? '<button class="btn" id="more">Повторить ещё</button>' : ''}
    <button class="btn ${left > 0 ? 'ghost' : ''}" id="home">На карту</button>
  </div>`;
  confetti();
  const m = document.getElementById('more'); if (m) m.onclick = startReview;
  document.getElementById('home').onclick = () => { TAB = 'home'; render(); };
}

/* ================== билеты ================== */
function renderTickets() {
  const done = Object.values(S.tickets).filter(Boolean).length;
  app.innerHTML = `<div class="page">
    <h1>📋 Экзаменационные вопросы</h1>
    <div class="sub">Отмечай, что уже разобрал: ${done}/${TICKETS.length}</div>
    ${TICKETS.map((t, i) => `
      <label class="ticket ${S.tickets[i] ? 'done' : ''}">
        <input type="checkbox" data-i="${i}" ${S.tickets[i] ? 'checked' : ''}>
        <span class="num">${i+1}.</span><span class="tx">${esc(t)}</span>
      </label>`).join('')}
  </div>`;
  app.querySelectorAll('input[type=checkbox]').forEach(c => c.addEventListener('change', () => {
    S.tickets[c.dataset.i] = c.checked; save(); renderTickets();
  }));
}

/* ================== профиль ================== */
function renderProfile() {
  const perfect = Object.keys(S.perfect).length;
  const tgUser = TG && TG.initDataUnsafe && TG.initDataUnsafe.user;
  const syncBadge = syncState === 'ok' ? '☁️ прогресс синхронизирован' : syncState === 'error' ? '⚠️ нет связи с сервером — прогресс пока локально' : syncState === 'connecting' ? '🔄 подключение…' : '📴 локальный режим (открой через Telegram для синхронизации)';
  app.innerHTML = `<div class="page">
    <h1>👤 ${tgUser ? esc(tgUser.first_name || 'Твой прогресс') : 'Твой прогресс'}</h1>
    <div class="sub">${tgUser && tgUser.username ? '@' + esc(tgUser.username) + ' · ' : ''}${syncBadge}</div>
    <div class="statgrid">
      <div class="statcard"><div class="v">⚡ ${S.xp}</div><div class="l">Всего XP</div></div>
      <div class="statcard"><div class="v">🔥 ${S.streak}</div><div class="l">Дней подряд</div></div>
      <div class="statcard"><div class="v">📚 ${doneCount()}/${ALL_LESSONS.length}</div><div class="l">Уроков пройдено</div></div>
      <div class="statcard"><div class="v">🏅 ${perfect}</div><div class="l">Идеальных уроков</div></div>
      <div class="statcard"><div class="v">🎓 ${S.bestExam}%</div><div class="l">Лучший экзамен</div></div>
      <div class="statcard"><div class="v">📋 ${Object.values(S.tickets).filter(Boolean).length}/45</div><div class="l">Билетов разобрано</div></div>
      <div class="statcard"><div class="v">🧪 ${Object.keys(S.codeDone).length}/${typeof CODE_CHALLENGES !== 'undefined' ? CODE_CHALLENGES.length : 0}</div><div class="l">Код-челленджей</div></div>
      <div class="statcard"><div class="v">🧠 ${weakCount()}</div><div class="l">Карточек на повторе</div></div>
    </div>
    <button class="btn blue" id="unlock">${S.unlockAll ? '🔒 Вернуть последовательное прохождение' : '🔓 Разблокировать все уроки'}</button>
    <button class="btn red" id="reset" style="margin-top:12px">Сбросить прогресс</button>
    <p style="color:var(--mut);font-size:13px;margin-top:18px;font-weight:700">
      План: 1 день = 1 юнит. Раздел «Экзамен» — пробник из 20 случайных вопросов. Уроки «📝 Экзамен: задачи» в дне 7 — разбор реальных типовых задач с листочка.</p>
  </div>`;
  document.getElementById('unlock').onclick = () => { S.unlockAll = !S.unlockAll; save(); renderProfile(); };
  document.getElementById('reset').onclick = () => {
    if (confirm('Точно сбросить весь прогресс?')) { localStorage.removeItem(KEY); S = load(); render(); }
  };
}

/* ================== песочница кода ================== */
const PLAYGROUND_STARTER = `#include <iostream>

int main() {
    std::cout << "Hello, C++!" << std::endl;
    return 0;
}`;

function renderCode() {
  const done = Object.keys(S.codeDone).length;
  let h = `<div class="page">
    <h1>🧪 Песочница кода</h1>
    <div class="sub">${TG ? 'Код реально компилируется и запускается (gcc, C++17)' : '📴 запуск доступен в Telegram-приложении'} · решено ${done}/${CODE_CHALLENGES.length}</div>
    <button class="codecard" id="play">
      <span class="cic">⚡</span>
      <span class="ct"><b>Свободная песочница</b><span>Пиши любой C++ и запускай прямо здесь</span></span>
    </button>
    <div class="run-label" style="margin-top:18px">Челленджи: допиши / исправь код</div>`;
  CODE_CHALLENGES.forEach((c, i) => {
    const solved = !!S.codeDone[c.id];
    h += `<button class="codecard ${solved ? 'solved' : ''}" data-c="${i}">
      <span class="cic">${c.icon}</span>
      <span class="ct"><b>${esc(c.title)}</b><span>${esc(c.prompt)}</span></span>
      ${solved ? '<span class="cdone">✓</span>' : ''}
    </button>`;
  });
  h += `</div>`;
  app.innerHTML = h;
  document.getElementById('play').onclick = openPlayground;
  app.querySelectorAll('[data-c]').forEach(b => b.onclick = () => openCodeChallenge(+b.dataset.c));
}
function openPlayground() {
  openEditor({ title: '⚡ Песочница', q: 'Пиши любой C++ код и жми «Запустить».', starter: PLAYGROUND_STARTER });
}
function openCodeChallenge(i) {
  const c = CODE_CHALLENGES[i];
  openEditor({ title: c.icon + ' ' + c.title, q: c.prompt + (c.hint ? '\n\n💡 ' + c.hint : ''), starter: c.starter, expect: c.expect, id: c.id });
}
function openEditor(opts) {
  document.body.classList.add('inlesson');
  app.innerHTML = `
    <div class="lesson-top">
      <button class="quit" id="quit">✕</button>
      <div style="font-weight:900;font-size:16px;flex:1;text-align:center">${esc(opts.title)}</div>
      <div style="width:30px"></div>
    </div>
    <div class="editor-wrap">
      <div class="editor-q">${fmt(opts.q).replace(/\n/g, '<br>')}</div>
      <textarea class="editor" id="editor" spellcheck="false">${esc(opts.starter)}</textarea>
      <div class="run-label">Вывод программы</div>
      <div class="run-out" id="out">— нажми «Запустить», чтобы скомпилировать и выполнить</div>
    </div>
    <div class="editor-bar">
      <button class="btn blue" id="run" style="flex:1">▶ Запустить</button>
      ${opts.expect != null ? '<button class="btn" id="check" style="flex:1">Проверить</button>' : ''}
    </div>`;
  document.getElementById('quit').onclick = () => { TAB = 'code'; render(); };
  const ed = document.getElementById('editor');
  const out = document.getElementById('out');
  const runBtn = document.getElementById('run');
  ed.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = ed.selectionStart, en = ed.selectionEnd;
      ed.value = ed.value.slice(0, s) + '    ' + ed.value.slice(en);
      ed.selectionStart = ed.selectionEnd = s + 4;
    }
  });
  runBtn.onclick = () => execCode(ed.value, out, runBtn);
  const chk = document.getElementById('check');
  if (chk) chk.onclick = async () => {
    const res = await execCode(ed.value, out, runBtn);
    if (!res) return;
    const got = (res.output || '').trim();
    const want = String(opts.expect).trim();
    if (!res.compile_error && got === want) {
      out.className = 'run-out good';
      const first = !S.codeDone[opts.id];
      S.codeDone[opts.id] = true;
      if (first) S.xp += 15;
      bumpStreak(); save();
      out.textContent = (got || '(пусто)') + '\n\n✅ Верно! ' + (first ? '+15 XP' : 'Задача уже была решена.');
      confetti(); vib(15);
    } else {
      out.className = 'run-out err';
      out.textContent = (res.compile_error ? res.compile_error.trim() + '\n\n' : '') +
        'Получено:\n' + (got || '(пусто)') + '\n\nОжидалось:\n' + want;
      vib([60, 40, 60]);
    }
  };
  window.scrollTo(0, 0);
}
async function execCode(code, outEl, btn) {
  outEl.className = 'run-out';
  outEl.innerHTML = '<span class="spin">⏳</span> Компиляция и запуск…';
  btn.disabled = true;
  try {
    const r = await fetch('/api/run', { method: 'POST', headers: tgHeaders({ 'Content-Type': 'application/json' }), body: JSON.stringify({ code }) });
    if (r.status === 429) { outEl.className = 'run-out err'; outEl.textContent = '⏳ Слишком часто — подожди пару секунд.'; return null; }
    const j = await r.json();
    if (!j.ok) { outEl.className = 'run-out err'; outEl.textContent = '⚠️ ' + (j.error || 'не удалось запустить'); return null; }
    let txt = '';
    if (j.compile_error) txt += j.compile_error.trim() + '\n';
    txt += (j.output || '');
    if (j.stderr) txt += (txt ? '\n' : '') + j.stderr;
    outEl.className = 'run-out' + (j.compile_error ? ' err' : '');
    outEl.textContent = txt.trim() || '(программа ничего не вывела)';
    return j;
  } catch (e) {
    outEl.className = 'run-out err';
    outEl.textContent = TG ? '⚠️ нет связи с сервером' : '⚠️ запуск кода доступен только в Telegram-приложении';
    return null;
  } finally { btn.disabled = false; }
}

render();
pullProgress();
</script>
