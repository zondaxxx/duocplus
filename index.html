<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#131f24">
<title>C++ Hero — подготовка к экзамену за 7 дней</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg: #131f24; --bg2: #1b2b33; --card: #202f36; --line: #37464f;
  --txt: #f1f7fb; --mut: #8da6b3;
  --green: #58cc02; --green-d: #46a302; --red: #ff4b4b; --red-d: #d33131;
  --blue: #1cb0f6; --gold: #ffc800; --purple: #ce82ff;
  --r: 16px;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: 'Nunito', -apple-system, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--txt);
  font-size: 17px; line-height: 1.45;
  overscroll-behavior-y: none;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
#wrap { max-width: 560px; margin: 0 auto; min-height: 100%; position: relative; }
#app { padding-bottom: 90px; }

/* ===== верхняя панель ===== */
.topbar {
  position: sticky; top: 0; z-index: 30; display: flex; justify-content: space-around;
  padding: 12px 16px; background: var(--bg);
  border-bottom: 2px solid var(--line); font-weight: 900; font-size: 18px;
}
.topbar span { display: flex; align-items: center; gap: 6px; }
.stat-fire { color: #ff9600; } .stat-xp { color: var(--gold); } .stat-day { color: var(--blue); }
.lang-chip { font-weight: 900; font-size: 14px; color: var(--accent); background: color-mix(in srgb, var(--accent) 14%, transparent); border: 2px solid color-mix(in srgb, var(--accent) 35%, transparent); padding: 5px 10px; border-radius: 12px; display: flex; align-items: center; gap: 5px; }

/* ===== выбор языка ===== */
body.picking #nav { display: none; }
.picker { padding: 32px 18px 40px; }
.picker-top { text-align: center; margin-bottom: 28px; }
.picker-logo { font-size: 60px; }
.picker-top h1 { font-size: 28px; font-weight: 900; margin-top: 6px; }
.picker-top p { color: var(--mut); font-weight: 700; font-size: 14px; margin-top: 6px; padding: 0 12px; }
.langcard { display: flex; align-items: center; gap: 14px; width: 100%; text-align: left; background: var(--card); border: 2px solid var(--line); border-bottom-width: 5px; border-radius: 18px; padding: 16px; margin-bottom: 14px; transition: transform .1s; }
.langcard:active { transform: translateY(2px); }
.langcard.cur { border-color: var(--accent); }
.lc-badge { width: 58px; height: 58px; border-radius: 16px; flex: none; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 900; color: #fff; box-shadow: 0 3px 0 rgba(0,0,0,.3); }
.lc-body { flex: 1; min-width: 0; }
.lc-body b { font-size: 22px; font-weight: 900; display: block; }
.lc-body span { font-size: 13px; color: var(--mut); font-weight: 700; display: block; margin: 2px 0 6px; }
.lc-stats { font-size: 12.5px; font-weight: 800; color: var(--txt); opacity: .85; }
.lc-go { color: var(--accent); font-size: 22px; font-weight: 900; flex: none; }
.picker-foot { text-align: center; font-size: 13px; font-weight: 800; color: var(--mut); margin-top: 20px; }

/* ===== путь ===== */
.unit-head {
  margin: 24px 12px 8px; border-radius: var(--r); padding: 18px 20px; color: #fff;
  box-shadow: 0 4px 0 rgba(0,0,0,.25);
}
.unit-head h2 { font-size: 21px; font-weight: 900; }
.unit-head p { font-size: 14px; opacity: .92; margin-top: 2px; font-weight: 700; }
.unit-head .day-tag { font-size: 13px; font-weight: 900; text-transform: uppercase; letter-spacing: .5px; opacity: .85; }
.path { display: flex; flex-direction: column; align-items: center; padding: 10px 0 6px; }
.node-row { display: flex; justify-content: center; width: 100%; }
.node {
  width: 72px; height: 72px; border-radius: 50%; margin: 10px 0;
  display: flex; align-items: center; justify-content: center; font-size: 30px;
  position: relative; transition: transform .1s;
  background: var(--card); box-shadow: 0 6px 0 #0e161a; border: none;
}
.node:active { transform: translateY(4px); box-shadow: 0 2px 0 #0e161a; }
.node.locked { filter: grayscale(1); opacity: .45; }
.node.done { background: var(--c, var(--green)); box-shadow: 0 6px 0 rgba(0,0,0,.35); }
.node.active { background: var(--c, var(--green)); box-shadow: 0 6px 0 rgba(0,0,0,.35); animation: bounce 1.6s infinite; margin-top: 40px; }
.node.active::after {
  content: 'НАЧАТЬ'; position: absolute; top: -34px; left: 50%; transform: translateX(-50%);
  background: #fff; color: var(--c, var(--green)); font-size: 12px; font-weight: 900;
  padding: 4px 10px; border-radius: 10px; white-space: nowrap; letter-spacing: 1px;
  animation: float 1.6s infinite;
}
.node .check { position: absolute; bottom: -2px; right: -2px; background: #fff; color: var(--green-d);
  width: 26px; height: 26px; border-radius: 50%; font-size: 15px; display: flex; align-items: center; justify-content: center; font-weight: 900; }
@keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
@keyframes float { 0%,100% { transform: translate(-50%,0); } 50% { transform: translate(-50%,-4px); } }
.node-label { font-size: 13px; color: var(--mut); font-weight: 800; text-align: center; margin-top: -6px; max-width: 130px; }

/* ===== нижняя навигация ===== */
#nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 560px; z-index: 40;
  display: flex; justify-content: space-around; padding: 8px 0 max(10px, env(safe-area-inset-bottom));
  background: var(--bg); border-top: 2px solid var(--line);
}
#nav button { font-size: 26px; padding: 6px 18px; border-radius: 12px; opacity: .55; }
#nav button.cur { opacity: 1; background: rgba(28,176,246,.12); outline: 2px solid var(--blue); }
body.inlesson #nav { display: none; }

/* ===== модалки ===== */
body.noscroll { overflow: hidden; }
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.78); z-index: 50;
  display: flex; align-items: flex-end; justify-content: center;
  overscroll-behavior: contain; -webkit-overflow-scrolling: touch;
}
.sheet {
  background: var(--bg2); width: 100%; max-width: 560px; border-radius: 24px 24px 0 0;
  padding: 24px 20px max(24px, env(safe-area-inset-bottom)); max-height: 86vh;
  overflow-y: auto; overscroll-behavior: contain; -webkit-overflow-scrolling: touch;
  position: relative; z-index: 1; will-change: transform;
  animation: up .22s ease-out;
}
@keyframes up { from { transform: translateY(60px); opacity: 0; } to { transform: none; opacity: 1; } }
.sheet h3 { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
.sheet .sub { color: var(--mut); font-weight: 700; margin-bottom: 16px; }

/* ===== кнопки ===== */
.btn {
  display: block; width: 100%; padding: 14px; border-radius: 14px;
  font-size: 17px; font-weight: 900; text-transform: uppercase; letter-spacing: .8px;
  background: var(--green); color: #fff; box-shadow: 0 4px 0 var(--green-d);
  transition: transform .07s, box-shadow .07s, filter .15s; text-align: center;
}
.btn:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--green-d); }
.btn.blue { background: var(--blue); box-shadow: 0 4px 0 #1389c4; }
.btn.ghost { background: transparent; color: var(--blue); box-shadow: none; border: 2px solid var(--line); }
.btn.red { background: var(--red); box-shadow: 0 4px 0 var(--red-d); }
.btn:disabled { background: var(--card); color: var(--mut); box-shadow: 0 4px 0 #0e161a; cursor: default; }
.btn + .btn { margin-top: 12px; }

/* ===== урок ===== */
.lesson-top { display: flex; align-items: center; gap: 12px; padding: 14px 16px 6px; }
.lesson-top .quit { font-size: 22px; color: var(--mut); padding: 4px 8px; }
.pbar { flex: 1; height: 14px; background: var(--card); border-radius: 8px; overflow: hidden; }
.pbar > div { height: 100%; background: var(--green); border-radius: 8px; width: 0; transition: width .35s; position: relative; }
.pbar > div::after { content: ''; position: absolute; top: 3px; left: 8px; right: 8px; height: 4px; border-radius: 2px; background: rgba(255,255,255,.3); }
.hearts { font-weight: 900; font-size: 17px; color: var(--red); display: flex; gap: 3px; align-items: center; }
.exwrap { padding: 18px 16px 140px; }
.extitle { font-size: 21px; font-weight: 900; margin-bottom: 14px; }
pre.code {
  background: #0d1418; border: 2px solid var(--line); border-radius: 12px;
  padding: 12px 14px; overflow-x: auto; font-size: 13.5px; line-height: 1.5;
  font-family: 'SF Mono', Menlo, Consolas, monospace; margin-bottom: 14px; white-space: pre;
}
.tok-k { color: #ff79b8; } .tok-s { color: #ffd866; } .tok-c { color: #6f8a96; } .tok-n { color: #8be9fd; }
code.inline { background: #0d1418; border: 1px solid var(--line); border-radius: 6px; padding: 1px 6px; font-family: Menlo, Consolas, monospace; font-size: .88em; }

.opt {
  display: block; width: 100%; text-align: left; padding: 13px 16px; margin-bottom: 10px;
  background: var(--card); border: 2px solid var(--line); border-bottom-width: 4px; border-radius: 14px;
  font-size: 16px; font-weight: 700; transition: all .12s; color: var(--txt);
}
.opt:active { transform: translateY(2px); border-bottom-width: 2px; }
.opt.sel { border-color: var(--blue); background: rgba(28,176,246,.14); color: var(--blue); }
.opt.good { border-color: var(--green); background: rgba(88,204,2,.15); color: #a8ff6b; }
.opt.bad { border-color: var(--red); background: rgba(255,75,75,.15); color: #ff9c9c; }

/* пары */
.match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.mopt { padding: 12px 10px; min-height: 58px; display: flex; align-items: center; justify-content: center; text-align: center;
  background: var(--card); border: 2px solid var(--line); border-bottom-width: 4px; border-radius: 14px; font-size: 14.5px; font-weight: 700; transition: all .12s; }
.mopt.sel { border-color: var(--blue); color: var(--blue); background: rgba(28,176,246,.14); }
.mopt.off { opacity: .28; pointer-events: none; border-color: var(--green); }
.mopt.shake { animation: shake .3s; border-color: var(--red); }
.shake { animation: shake .3s; }
@keyframes shake { 0%,100% { transform: none; } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

/* ввод ответа строкой */
.answer-input {
  width: 100%; padding: 15px 16px; border-radius: 14px;
  background: var(--card); border: 2px solid var(--line); border-bottom-width: 4px;
  color: var(--txt); font-size: 19px; font-weight: 800; font-family: inherit; outline: none;
}
.answer-input::placeholder { color: var(--mut); font-weight: 700; }
.answer-input:focus { border-color: var(--blue); }
.answer-input:disabled { opacity: .65; }
.answer-input.mono { font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 17px; }
.in-hint { margin-top: 12px; color: var(--mut); font-size: 14px; font-weight: 700; }
.in-tag { display:inline-block; margin-bottom:12px; font-size:12px; font-weight:900; letter-spacing:.6px; text-transform:uppercase; color:var(--purple); background:rgba(206,130,255,.12); border:2px solid rgba(206,130,255,.3); padding:4px 10px; border-radius:10px; }

/* порядок и пропуски */
.slots { min-height: 56px; border-bottom: 2px solid var(--line); display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 2px; margin-bottom: 18px; }
.bank { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.tokenbtn { padding: 10px 14px; background: var(--card); border: 2px solid var(--line); border-bottom-width: 4px;
  border-radius: 12px; font-size: 15px; font-weight: 800; transition: all .1s; }
.tokenbtn:active { transform: translateY(2px); }
.tokenbtn.used { opacity: .25; pointer-events: none; }
.fill-q { font-size: 18px; font-weight: 700; margin-bottom: 18px; line-height: 2; }
.gap { display: inline-block; min-width: 110px; border-bottom: 3px solid var(--mut); text-align: center; font-weight: 900; color: var(--gold); padding: 0 6px; }

/* футер проверки */
.checkbar {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 560px;
  padding: 16px 16px max(20px, env(safe-area-inset-bottom)); background: var(--bg); border-top: 2px solid var(--line); z-index: 45;
}
.checkbar.ok { background: #122e18; border-color: #1d4a26; }
.checkbar.no { background: #331417; border-color: #582025; }
.fb { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 12px; }
.fb .fico { font-size: 30px; line-height: 1; }
.fb b { font-size: 19px; display: block; }
.fb .ok-t { color: #7dff5e; } .fb .no-t { color: #ff9c9c; }
.fb p { font-size: 14.5px; color: var(--txt); opacity: .9; margin-top: 3px; }

/* теория */
.theory { font-size: 15.5px; line-height: 1.5; }
.theory p { margin-bottom: 11px; }
.theory .th-h { font-size: 17px; font-weight: 900; color: var(--txt); margin: 18px 0 8px; padding-left: 11px; border-left: 4px solid var(--blue); }
.theory .th-h:first-child { margin-top: 2px; }
.theory .th-list { margin: 2px 0 12px; padding-left: 8px; list-style: none; }
.theory ul.th-list > li { position: relative; padding-left: 20px; margin-bottom: 7px; }
.theory ul.th-list > li::before { content: '▸'; position: absolute; left: 2px; color: var(--blue); font-weight: 900; }
.theory ol.th-list { counter-reset: thl; }
.theory ol.th-list > li { position: relative; padding-left: 28px; margin-bottom: 7px; }
.theory ol.th-list > li::before { counter-increment: thl; content: counter(thl); position: absolute; left: 0; top: 0; width: 20px; height: 20px; background: var(--blue); color: #fff; border-radius: 6px; font-size: 12px; font-weight: 900; display: flex; align-items: center; justify-content: center; }
.theory table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 13.5px; }
.theory th, .theory td { border: 1px solid var(--line); padding: 6px 8px; text-align: left; vertical-align: top; }
.theory th { background: var(--card); }
.theory .keytip { background: rgba(28,176,246,.1); border: 1px solid rgba(28,176,246,.3); border-radius: 10px; padding: 10px 12px; margin: 10px 0; }

/* конец урока */
.endscr { text-align: center; padding: 70px 24px 40px; }
.endscr .big { font-size: 64px; margin-bottom: 8px; }
.endscr h2 { font-size: 26px; font-weight: 900; color: var(--gold); margin-bottom: 24px; }
.endcards { display: flex; gap: 10px; justify-content: center; margin-bottom: 34px; }
.endcard { border-radius: 14px; padding: 2px; min-width: 100px; font-weight: 900; }
.endcard .in { background: var(--bg); margin: 2px; border-radius: 12px; padding: 12px 8px; }
.endcard small { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
.confetti { position: fixed; top: -30px; font-size: 22px; z-index: 60; animation: fall linear forwards; pointer-events: none; }
@keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: .4; } }

/* списки (билеты, профиль) */
.page { padding: 18px 16px; }
.page h1 { font-size: 24px; font-weight: 900; margin-bottom: 4px; }
.page .sub { color: var(--mut); font-weight: 700; margin-bottom: 18px; font-size: 15px; }
.ticket { display: flex; gap: 12px; align-items: flex-start; background: var(--card); border: 2px solid var(--line);
  border-radius: 14px; padding: 12px 14px; margin-bottom: 10px; font-weight: 700; font-size: 15px; }
.ticket .num { color: var(--mut); font-weight: 900; min-width: 26px; }
.ticket.done { border-color: var(--green); }
.ticket.done .tx { color: var(--mut); text-decoration: line-through; }
.ticket input { width: 22px; height: 22px; accent-color: var(--green); margin-top: 2px; flex: none; }
.statgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
.statcard { background: var(--card); border: 2px solid var(--line); border-radius: 16px; padding: 16px; }
.statcard .v { font-size: 26px; font-weight: 900; }
.statcard .l { font-size: 13px; color: var(--mut); font-weight: 800; text-transform: uppercase; letter-spacing: .5px; }

/* персональная пасхалка */
.egg-banner {
  margin: 14px 12px 0; border-radius: var(--r); padding: 14px 18px;
  background: linear-gradient(120deg, #ff4b4b, #ff9600); color: #fff;
  font-weight: 900; font-size: 16px; text-align: center;
  box-shadow: 0 4px 0 rgba(0,0,0,.3); animation: eggwobble 2.4s ease-in-out infinite;
}
@keyframes eggwobble { 0%,100% { transform: rotate(-1deg); } 50% { transform: rotate(1deg); } }

/* карточка повторения на главной */
.srs-card { margin: 14px 12px 0; border-radius: var(--r); padding: 16px 18px; background: linear-gradient(120deg,#7e3ff2,#b14bff); color:#fff; box-shadow: 0 4px 0 rgba(0,0,0,.3); display:flex; align-items:center; gap:14px; }
.srs-card .ic { font-size: 34px; }
.srs-card .tx b { font-size: 17px; font-weight: 900; display:block; }
.srs-card .tx span { font-size: 13px; opacity:.92; font-weight:700; }
.srs-card .go { margin-left:auto; background:#fff; color:#8a2be2; font-weight:900; padding:9px 14px; border-radius:12px; font-size:13px; white-space:nowrap; }

/* карточки на вкладке «Код» */
.codecard { display:flex; gap:12px; align-items:flex-start; background: var(--card); border:2px solid var(--line); border-bottom-width:4px; border-radius:14px; padding:14px; margin-bottom:11px; text-align:left; width:100%; transition:transform .1s; }
.codecard:active { transform: translateY(2px); }
.codecard.solved { border-color: var(--green); }
.codecard .cic { font-size:26px; flex:none; }
.codecard .ct b { font-size:16px; font-weight:900; display:block; margin-bottom:2px; }
.codecard .ct span { font-size:13.5px; color:var(--mut); font-weight:700; }
.codecard .cdone { margin-left:auto; color:var(--green); font-weight:900; font-size:18px; flex:none; }

/* редактор кода */
.editor-wrap { padding: 14px 14px 160px; }
.editor-q { font-size:16px; font-weight:700; margin-bottom:12px; line-height:1.5; }
textarea.editor {
  width:100%; min-height:230px; background:#0d1418; color:#e6f0f5; border:2px solid var(--line);
  border-radius:12px; padding:12px 14px; font-family:'SF Mono',Menlo,Consolas,monospace;
  font-size:13px; line-height:1.55; resize:vertical; white-space:pre; tab-size:4; -moz-tab-size:4;
  outline:none; caret-color: var(--green);
}
textarea.editor:focus { border-color: var(--blue); }
.run-out {
  margin-top:12px; background:#0a0f12; border:2px solid var(--line); border-radius:12px;
  padding:11px 14px; font-family:'SF Mono',Menlo,Consolas,monospace; font-size:12.5px; line-height:1.5;
  white-space:pre-wrap; word-break:break-word; min-height:46px; color:#cfe3ec;
}
.run-out.err { border-color: var(--red); color:#ffb4b4; }
.run-out.good { border-color: var(--green); color:#bff59a; }
.run-label { font-size:12px; color:var(--mut); font-weight:800; text-transform:uppercase; letter-spacing:.6px; margin:14px 2px 6px; }
.editor-bar { position: fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:560px; padding:14px 14px max(18px,env(safe-area-inset-bottom)); background:var(--bg); border-top:2px solid var(--line); z-index:45; display:flex; gap:10px; }
.editor-bar .btn { margin:0; }
.spin { display:inline-block; animation: spin 0.9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== практика: редактор кода в уроке ===== */
.prac-wrap { padding: 16px 16px 160px; }
.prac-goal { font-size:15px; line-height:1.55; margin-bottom:14px; }
.prac-goal code { background:#0d1418; border:1px solid var(--line); border-radius:5px; padding:1px 6px; font-family:Menlo,Consolas,monospace; font-size:.88em; color:#ffd27d; }
.prac-tag { display:inline-block; margin-bottom:10px; font-size:12px; font-weight:900; letter-spacing:.5px; text-transform:uppercase; color:var(--gold); background:rgba(255,200,0,.1); border:2px solid rgba(255,200,0,.3); padding:4px 10px; border-radius:10px; }
.ced { position:relative; background:#0d1418; border:2px solid var(--line); border-radius:12px; overflow:hidden; display:flex; height:240px; }
.ced-gut { flex:none; overflow:hidden; min-width:38px; background:#0d1418; }
.ced-gut .gi { padding:10px 0; font:12.5px/19px Menlo,Consolas,monospace; color:#5a6b75; }
.ced-gut .gi div { height:19px; padding:0 8px 0 6px; text-align:right; }
.ced-area { position:relative; flex:1; min-width:0; overflow:hidden; }
.ced-area pre, .ced-area textarea { position:absolute; inset:0; margin:0; padding:10px 12px; font:12.5px/19px Menlo,Consolas,monospace; white-space:pre; tab-size:4; border:0; overflow:auto; }
.ced-area pre { pointer-events:none; color:#d4d4d4; }
.ced-area textarea { background:transparent; color:transparent; caret-color:#fff; resize:none; outline:none; }
.ck-kw{color:#ff79b8}.ck-ty{color:#8be9fd}.ck-str{color:#ffd866}.ck-com{color:#6f8a96}.ck-num{color:#bd93f9}.ck-pre{color:#c586c0}.ck-fn{color:#dcdcaa}

<script>
'use strict';
/* ================== Telegram Mini App ================== */
let EGG = null;                        // персональная пасхалка (приходит с сервера)
const TG = (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) ? window.Telegram.WebApp : null;
let syncState = TG ? 'connecting' : 'off'; // off | connecting | ok | error
if (TG) {
  try { TG.ready(); TG.expand(); TG.setHeaderColor('#131f24'); TG.setBackgroundColor('#131f24'); } catch (e) {}
  try { if (TG.disableVerticalSwipes) TG.disableVerticalSwipes(); } catch (e) {}
}
function tgHeaders(extra) {
  return Object.assign(TG ? { 'Authorization': 'tma ' + TG.initData } : {}, extra || {});
}
function mergeBucket(a, b) { // объединение прогресса одного языка
  a = a || blankProgress(); b = b || blankProgress();
  const out = JSON.parse(JSON.stringify(a));
  out.xp = Math.max(a.xp || 0, b.xp || 0);
  out.streak = Math.max(a.streak || 0, b.streak || 0);
  out.bestExam = Math.max(a.bestExam || 0, b.bestExam || 0);
  out.examCount = Math.max(a.examCount || 0, b.examCount || 0);
  out.unlockAll = !!(a.unlockAll || b.unlockAll);
  const da = a.lastDay ? new Date(a.lastDay) : 0, db = b.lastDay ? new Date(b.lastDay) : 0;
  out.lastDay = (da > db) ? a.lastDay : (b.lastDay || a.lastDay || '');
  out.done = Object.assign({}, b.done, a.done);
  out.perfect = Object.assign({}, b.perfect, a.perfect);
  out.tickets = Object.assign({}, b.tickets, a.tickets);
  out.codeDone = Object.assign({}, b.codeDone, a.codeDone);
  out.practiceDone = Object.assign({}, b.practiceDone, a.practiceDone);
  out.srs = Object.assign({}, b.srs);
  for (const g in (a.srs || {})) {
    const ea = a.srs[g], eb = (b.srs || {})[g];
    out.srs[g] = (!eb || (ea.last || 0) >= (eb.last || 0)) ? ea : eb;
  }
  return out;
}
function mergeProgress(a, b) { // объединяем два STORE (a — локальный, b — серверный)
  if (!b || typeof b !== 'object') return a;
  const A = normalizeStore(a), B = normalizeStore(b);
  const out = { lang: LANG_IDS.indexOf(A.lang) >= 0 ? A.lang : B.lang, soundOff: A.soundOff, chosen: !!(A.chosen || B.chosen), langs: {} };
  for (const k of LANG_IDS) out.langs[k] = mergeBucket(A.langs[k], B.langs[k]);
  return out;
}
let syncTimer = null;
function scheduleSync() {
  if (!TG) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(pushProgress, 1200);
}
async function pushProgress() {
  if (!TG) return;
  try {
    const r = await fetch('/api/progress', { method: 'POST', headers: tgHeaders({ 'Content-Type': 'application/json' }), body: JSON.stringify(STORE) });
    syncState = r.ok ? 'ok' : 'error';
  } catch (e) { syncState = 'error'; }
}
async function pullProgress() {
  if (!TG) return;
  try {
    const r = await fetch('/api/progress', { headers: tgHeaders() });
    if (!r.ok) { syncState = 'error'; return; }
    const j = await r.json();
    if (j.progress) { STORE = mergeProgress(STORE, j.progress); useLang(STORE.lang); save(); }
    if (j.egg) EGG = j.egg;            // персональная пасхалка с сервера
    syncState = 'ok';
    render();
  } catch (e) { syncState = 'error'; }
}
// отправка прогресса при сворачивании мини-аппа
window.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden' && TG) {
    try { navigator.sendBeacon('/api/progress', new Blob([JSON.stringify({ initData: TG.initData, progress: STORE })], { type: 'application/json' })); } catch (e) {}
  }
});

/* ================== состояние (мультиязычное: C / C++) ================== */
const KEY = 'cppduo_v1';
const LANG_IDS = Object.keys(LANGS);           // ['cpp','c']
function blankProgress() {
  return { xp: 0, streak: 0, lastDay: '', done: {}, perfect: {}, tickets: {}, unlockAll: false, bestExam: 0, examCount: 0, srs: {}, codeDone: {}, practiceDone: {} };
}
function fillBucket(p) { return Object.assign(blankProgress(), p || {}); }
function normalizeStore(raw) {
  // новый формат: { lang, soundOff, chosen, langs:{ cpp, c } }
  if (raw && raw.langs && (raw.langs.cpp || raw.langs.c)) {
    const langs = {};
    for (const k of LANG_IDS) langs[k] = fillBucket(raw.langs[k]);
    return { lang: LANG_IDS.indexOf(raw.lang) >= 0 ? raw.lang : 'cpp', soundOff: !!raw.soundOff, chosen: !!raw.chosen, langs };
  }
  // старый плоский формат (только C++) → переносим в langs.cpp, прогресс не теряется
  if (raw && raw.done) {
    const langs = {}; for (const k of LANG_IDS) langs[k] = blankProgress();
    langs.cpp = fillBucket(raw);
    return { lang: 'cpp', soundOff: !!raw.soundOff, chosen: true, langs };
  }
  const langs = {}; for (const k of LANG_IDS) langs[k] = blankProgress();
  return { lang: 'cpp', soundOff: false, chosen: false, langs };
}
function load() {
  let raw = null;
  try { raw = JSON.parse(localStorage.getItem(KEY)); } catch (e) {}
  return normalizeStore(raw);
}
let STORE = load();
let S, ACTIVE, ALL_LESSONS, EX_BY_ID, TICKETS, CODE_CHALLENGES;
function useLang(lang) {
  if (LANG_IDS.indexOf(lang) < 0) lang = 'cpp';
  STORE.lang = lang;
  S = STORE.langs[lang];
  ACTIVE = LANGS[lang];
  TICKETS = ACTIVE.tickets;
  CODE_CHALLENGES = ACTIVE.challenges;
  ALL_LESSONS = [];
  EX_BY_ID = {};
  ACTIVE.course.forEach(u => u.lessons.forEach(l => {
    ALL_LESSONS.push({ u, l });
    l.ex.forEach((e, i) => { e._gid = lang + ':' + l.id + '#' + i; e._lesson = l.title; EX_BY_ID[e._gid] = e; });
  }));
}
function lessonIndex(id) { return ALL_LESSONS.findIndex(x => x.l.id === id); }

/* ---- детерминированный XP: считается из достижений, фарм переигровкой невозможен ----
   Та же формула продублирована на сервере (server/recompute_xp.py) — клиент и БД совпадают. */
function examBonus(b) { b = b || 0; return b >= 90 ? 50 : b >= 75 ? 30 : b >= 50 ? 15 : b > 0 ? 5 : 0; }
function computeXp(b) {
  if (!b) return 0;
  let xp = 0;
  const done = b.done || {}, perfect = b.perfect || {}, code = b.codeDone || {}, prac = b.practiceDone || {};
  for (const id in done) if (done[id]) xp += 10 + (perfect[id] ? 5 : 0); // урок: 10, +5 за идеал — один раз
  for (const id in code) if (code[id]) xp += 15;                          // код-челлендж: 15 — один раз
  for (const id in prac) if (prac[id]) xp += 12;                          // практика урока: 12 — один раз
  xp += examBonus(b.bestExam);                                           // экзамен: бонус за ЛУЧШИЙ результат
  return xp;
}
function recomputeAll() { for (const k of LANG_IDS) STORE.langs[k].xp = computeXp(STORE.langs[k]); }
function totalXp() { let t = 0; for (const k of LANG_IDS) t += (STORE.langs[k].xp || 0); return t; }
function save() {
  recomputeAll();                              // XP всегда пересчитывается из достижений
  STORE.xp = totalXp();                        // зеркало XP для лидерборда (БД-индекс читает progress->>'xp')
  try { localStorage.setItem(KEY, JSON.stringify(STORE)); } catch (e) {}
  scheduleSync();
}
useLang(STORE.lang);
recomputeAll();                                // исправляем возможный старый нафармленный XP при загрузке

// SM-2-lite: интервалы в днях по числу успешных повторов подряд
const SRS_STEPS = [1, 2, 4, 8, 16, 30];
function srsLapse(gid) { // ошибка: карточка снова «горит»
  const e = S.srs[gid] || { reps: 0, lapses: 0 };
  e.reps = 0; e.lapses = (e.lapses || 0) + 1;
  e.due = Date.now(); e.last = Date.now();
  S.srs[gid] = e; save();
}
function srsAdvance(gid) { // верный ответ: отодвигаем повтор дальше
  const e = S.srs[gid]; if (!e) return;
  const days = SRS_STEPS[Math.min(e.reps || 0, SRS_STEPS.length - 1)];
  e.reps = (e.reps || 0) + 1;
  e.due = Date.now() + days * 86400000; e.last = Date.now();
  S.srs[gid] = e; save();
}
function dueIds() {
  const now = Date.now();
  return Object.keys(S.srs).filter(g => EX_BY_ID[g] && (S.srs[g].due || 0) <= now);
}
function weakCount() { return dueIds().length; }
function isUnlocked(id) {
  if (S.unlockAll) return true;
  const i = lessonIndex(id);
  return i === 0 || !!S.done[ALL_LESSONS[i-1].l.id];
}
function doneCount() { return ALL_LESSONS.filter(x => S.done[x.l.id]).length; }

/* ================== утилиты ================== */
const app = document.getElementById('app');
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(s) { // инлайн-разметка: `код`, **жирный**
  return esc(s).replace(/`([^`]+)`/g, '<code class="inline">$1</code>').replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>');
}
function hl(code) { // подсветка C++
  let t = esc(code);
  const hold = [];
  t = t.replace(/(\/\/[^\n]*)|(&quot;.*?&quot;|"[^"]*")|('[^']*')/g, m => {
    hold.push(m.startsWith('//') ? '<span class="tok-c">'+m+'</span>' : '<span class="tok-s">'+m+'</span>');
    return '\u0001' + (hold.length-1) + '\u0001';
  });
  t = t.replace(/\b(class|struct|public|private|protected|virtual|override|final|explicit|template|typename|concept|requires|using|namespace|friend|operator|const|constexpr|static|inline|return|if|else|for|while|do|new|delete|try|catch|throw|noexcept|this|true|false|nullptr|default|sizeof|enum|switch|case|break|continue)\b/g, '<span class="tok-k">$1</span>');
  t = t.replace(/\b(int|double|float|char|void|bool|auto|size_t|long|short|unsigned)\b/g, '<span class="tok-n">$1</span>');
  t = t.replace(/\u0001(\d+)\u0001/g, (m, i) => hold[+i]);
  return t;
}
function renderTable(rows) {
  return '<table>' + rows.map((r, ri) => {
    const cells = r.split('|').slice(1, -1).map(c => c.trim());
    if (cells.every(c => /^:?-+:?$/.test(c))) return ''; // строка-разделитель |---|
    const tag = ri === 0 ? 'th' : 'td';
    return '<tr>' + cells.map(c => `<${tag}>${fmt(c)}</${tag}>`).join('') + '</tr>';
  }).join('') + '</table>';
}
function theoryHTML(md) {
  const parts = String(md).split('```');
  let out = '';
  parts.forEach((p, i) => {
    if (i % 2 === 1) {
      const code = p.replace(/^\n/, '').replace(/^(c\+\+|cpp|cc|c|cmake|makefile|make|bash|sh|sql|asm|json|text|txt)[ \t]*\n/i, '').replace(/\n$/, '');
      out += '<pre class="code">' + hl(code) + '</pre>'; return;
    }
    const lines = p.split('\n');
    let tbl = [], para = [], list = null;
    const flushT = () => { if (tbl.length) { out += renderTable(tbl); tbl = []; } };
    const flushP = () => { if (para.length) { out += '<p>' + para.map(fmt).join('<br>') + '</p>'; para = []; } };
    const flushL = () => { if (list) { out += '<' + list.tag + ' class="th-list">' + list.items.map(it => '<li>' + fmt(it) + '</li>').join('') + '</' + list.tag + '>'; list = null; } };
    const flushAll = () => { flushT(); flushP(); flushL(); };
    lines.forEach(ln => {
      const t = ln.trim();
      if (t === '') { flushAll(); return; }
      if (t.startsWith('|')) { flushP(); flushL(); tbl.push(t); return; }
      flushT();
      const h = t.match(/^(#{1,4})\s+(.*)/);
      if (h) { flushP(); flushL(); out += '<div class="th-h">' + fmt(h[2]) + '</div>'; return; }
      const b = t.match(/^[-•*]\s+(.*)/);
      if (b) { flushP(); if (!list || list.tag !== 'ul') { flushL(); list = { tag: 'ul', items: [] }; } list.items.push(b[1]); return; }
      const o = t.match(/^\d+[.)]\s+(.*)/);
      if (o) { flushP(); if (!list || list.tag !== 'ol') { flushL(); list = { tag: 'ol', items: [] }; } list.items.push(o[1]); return; }
      flushL();
      para.push(ln);
    });
    flushAll();
  });
  return '<div class="theory">' + out + '</div>';
}
function shuffle(a) { a = a.slice(); for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]] = [a[j],a[i]]; } return a; }
function vib(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

/* ================== звук (Web Audio, без файлов) ================== */
let _ac = null;
function ac() {
  if (STORE.soundOff) return null;
  if (!_ac) { try { _ac = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return null; } }
  if (_ac.state === 'suspended') { try { _ac.resume(); } catch (e) {} }
  return _ac;
}
function tone(freq, start, dur, opt) {
  opt = opt || {};
  const c = ac(); if (!c) return;
  const t0 = c.currentTime + start;
  const osc = c.createOscillator(), g = c.createGain();
  osc.type = opt.type || 'sine';
  osc.frequency.setValueAtTime(freq, t0);
  if (opt.glideTo) osc.frequency.exponentialRampToValueAtTime(opt.glideTo, t0 + dur);
  const peak = opt.gain || 0.16;
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(peak, t0 + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  osc.connect(g).connect(c.destination);
  osc.start(t0); osc.stop(t0 + dur + 0.03);
}
const SFX = {
  select() { tone(540, 0, 0.05, { type: 'sine', gain: 0.07 }); },
  click()  { tone(400, 0, 0.045, { type: 'triangle', gain: 0.06 }); },
  correct() { tone(659.25, 0, 0.10, { type: 'triangle', gain: 0.16 }); tone(987.77, 0.09, 0.15, { type: 'triangle', gain: 0.16 }); },
  wrong()   { tone(196, 0, 0.20, { type: 'sawtooth', gain: 0.13, glideTo: 120 }); tone(146, 0.02, 0.20, { type: 'square', gain: 0.05 }); },
  complete() { [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => tone(f, i * 0.10, 0.16, { type: 'triangle', gain: 0.15 })); tone(1568, 0.42, 0.22, { type: 'sine', gain: 0.09 }); },
  fanfare() { [523.25, 659.25, 783.99, 1046.5, 1318.5].forEach((f, i) => tone(f, i * 0.09, 0.18, { type: 'triangle', gain: 0.16 })); tone(1046.5, 0.5, 0.45, { type: 'sine', gain: 0.08 }); tone(1318.5, 0.5, 0.45, { type: 'sine', gain: 0.06 }); },
  fail()    { [330, 277, 233, 174].forEach((f, i) => tone(f, i * 0.14, 0.22, { type: 'sawtooth', gain: 0.12, glideTo: f * 0.97 })); },
};
function haptic(kind) {
  try {
    if (TG && TG.HapticFeedback) {
      if (kind === 'success' || kind === 'error' || kind === 'warning') TG.HapticFeedback.notificationOccurred(kind);
      else TG.HapticFeedback.impactOccurred(kind);
    }
  } catch (e) {}
}
// разблокировка аудио по первому касанию (требование мобильных браузеров)
window.addEventListener('pointerdown', () => ac(), { once: true });
function todayStr() { return new Date().toDateString(); }
function bumpStreak() {
  const t = todayStr();
  if (S.lastDay === t) return;
  const y = new Date(); y.setDate(y.getDate()-1);
  S.streak = (S.lastDay === y.toDateString()) ? S.streak + 1 : 1;
  S.lastDay = t;
}

/* ================== навигация ================== */
let TAB = 'picker';
document.getElementById('nav').addEventListener('click', e => {
  const b = e.target.closest('button'); if (!b) return;
  TAB = b.dataset.tab; render();
});
function setNav() {
  document.querySelectorAll('#nav button').forEach(b => b.classList.toggle('cur', b.dataset.tab === TAB));
}
function render() {
  document.body.classList.remove('inlesson');
  document.body.classList.toggle('picking', TAB === 'picker');
  setNav();
  if (TAB === 'picker') renderPicker();
  else if (TAB === 'home') renderHome();
  else if (TAB === 'code') renderCode();
  else if (TAB === 'tickets') renderTickets();
  else if (TAB === 'exam') renderExamIntro();
  else renderProfile();
  window.scrollTo(0, 0);
}

/* ================== выбор языка ================== */
function langProgress(id) {
  const p = STORE.langs[id], course = LANGS[id].course;
  let lessons = 0, done = 0;
  course.forEach(u => u.lessons.forEach(l => { lessons++; if (p.done[l.id]) done++; }));
  return { xp: p.xp || 0, streak: p.streak || 0, done, lessons };
}
function chooseLang(id) {
  useLang(id);
  STORE.chosen = true;
  save();
  SFX.select(); haptic('light');
  TAB = 'home';
  render();
}
function renderPicker() {
  const cards = LANG_IDS.map(id => {
    const L = LANGS[id], pr = langProgress(id), cur = STORE.lang === id;
    return `<button class="langcard ${cur ? 'cur' : ''}" data-lang="${id}" style="--accent:${L.accent}">
      <div class="lc-badge" style="background:${L.accent}">${L.badge}</div>
      <div class="lc-body">
        <b>${esc(L.name)}</b>
        <span>${esc(L.blurb)}</span>
        <div class="lc-stats">⚡ ${pr.xp} XP · 📚 ${pr.done}/${pr.lessons}${pr.streak ? ' · 🔥 ' + pr.streak : ''}</div>
      </div>
      <div class="lc-go">▶</div>
    </button>`;
  }).join('');
  app.innerHTML = `<div class="picker">
    <div class="picker-top">
      <div class="picker-logo">🦉</div>
      <h1>C / C++ Hero</h1>
      <p>Выбери язык, который учишь — прогресс по каждому хранится отдельно</p>
    </div>
    ${cards}
    <p class="picker-foot">made by <a href="https://t.me/nyanzondaxxx" style="color:var(--blue);text-decoration:none">@nyanzondaxxx</a></p>
  </div>`;
  app.querySelectorAll('.langcard').forEach(b => b.onclick = () => chooseLang(b.dataset.lang));
}

/* ================== главная: путь ================== */
function renderHome() {
  let h = `<div class="topbar">
    <button class="lang-chip" id="langchip" style="--accent:${ACTIVE.accent}">${esc(ACTIVE.name)} ▾</button>
    <span class="stat-fire">🔥 ${S.streak}</span>
    <span class="stat-xp">⚡ ${S.xp}</span>
    <span class="stat-day">📚 ${doneCount()}/${ALL_LESSONS.length}</span>
  </div>`;
  if (EGG) {
    h += `<div class="egg-banner">🥚 ${esc(EGG)}</div>`;
  }
  const weak = weakCount();
  if (weak > 0) {
    h += `<button class="srs-card" id="srscard">
      <span class="ic">🧠</span>
      <span class="tx"><b>Прокачать слабое</b><span>${weak} ${plural(weak, 'карточка', 'карточки', 'карточек')} на повторение — закрепи то, где ошибался</span></span>
      <span class="go">Повторить →</span>
    </button>`;
  }
  const offsets = [0, -70, -40, 40, 70];
  ACTIVE.course.forEach(u => {
    const total = u.lessons.length, done = u.lessons.filter(l => S.done[l.id]).length;
    h += `<div class="unit-head" style="background:${u.color}">
      <div class="day-tag">День ${u.day} · ${done}/${total}</div>
      <h2>${u.icon} ${esc(u.title)}</h2><p>${esc(u.desc)}</p>
    </div><div class="path">`;
    u.lessons.forEach((l, i) => {
      const done = !!S.done[l.id];
      const unlocked = isUnlocked(l.id);
      const cls = done ? 'done' : (unlocked ? 'active' : 'locked');
      const off = offsets[i % offsets.length];
      h += `<div class="node-row" style="transform:translateX(${off}px)">
        <div style="display:flex;flex-direction:column;align-items:center">

function plural(n, one, few, many) {
  const m10 = n % 10, m100 = n % 100;
  if (m10 === 1 && m100 !== 11) return one;
  if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return few;
  return many;
}

// единая точка для модалок: блокирует скролл фона, чтобы он не «протекал» поверх листа

/* ================== движок урока ================== */
let L = null; // текущая сессия
const LESSON_SIZE = 12; // сколько вопросов в одном прохождении урока (берутся случайно из пула темы)
// mode: undefined='урок' | 'exam'='пробный экзамен' | 'review'='повторение слабого'
function startLesson(idOrObj, mode) {
  const isObj = typeof idOrObj === 'object';
  const l = isObj ? idOrObj : ALL_LESSONS[lessonIndex(idOrObj)].l;
  const exam = mode === 'exam', review = mode === 'review';
  // обычный урок: случайные LESSON_SIZE вопросов из пула темы (пул может быть большим — урок остаётся коротким и разным)
  const exList = isObj ? l.ex.slice() : shuffle(l.ex).slice(0, LESSON_SIZE);
  L = {
    id: isObj ? '__' + (mode || 'session') + '__' : l.id,
    exam, review,
    queue: exList.map((e, i) => i),
    ex: exList,
    pos: 0, hearts: (exam || review) ? Infinity : 4,
    solved: new Set(), seenWrong: new Set(), firstTry: 0, mistakes: 0, answered: 0,
  };
  document.body.classList.add('inlesson');
  showExercise();
}
function startReview() {
  const ids = shuffle(dueIds()).slice(0, 15);
  if (!ids.length) { render(); return; }
  startLesson({ ex: ids.map(g => EX_BY_ID[g]) }, 'review');
}
function quitLesson() {
  if (confirm('Выйти? Прогресс этой сессии не сохранится.')) { L = null; render(); }
}
function progressPct() { return Math.round(L.solved.size / L.ex.length * 100); }

function showExercise() {
  if (L.pos >= L.queue.length) { finishLesson(); return; }
  const exi = L.queue[L.pos];
  const ex = L.ex[exi];
  const heartsHtml = L.exam ? `<span class="hearts">🎓</span>` :
    L.review ? `<span class="hearts">🧠</span>` :
    `<span class="hearts">❤️ ${L.hearts}</span>`;
  let body = '';
  if (ex.t === 'c' || ex.t === 'tf') body = renderChoice(ex);
  else if (ex.t === 'f') body = renderFill(ex);
  else if (ex.t === 'm') body = renderMatch(ex);
  else if (ex.t === 'o') body = renderOrder(ex);
  else if (ex.t === 'in') body = renderInput(ex);
  app.innerHTML = `
    <div class="lesson-top">
      <button class="quit" id="quit">✕</button>
      <div class="pbar"><div style="width:${progressPct()}%"></div></div>
      ${heartsHtml}
    </div>
    <div class="exwrap">${body}</div>
    <div class="checkbar" id="cbar">
      <button class="btn" id="check" disabled>Проверить</button>
    </div>`;
  document.getElementById('quit').onclick = quitLesson;
  bindExercise(ex);
  window.scrollTo(0, 0);
}

/* ---------- choice / truefalse ---------- */
function renderChoice(ex) {
  let opts, correct;
  if (ex.t === 'tf') { opts = ['Верно ✅','Неверно ❌']; correct = ex.a ? 0 : 1; L._map = [0,1]; }
  else {
    const idx = shuffle(ex.o.map((_, i) => i));
    L._map = idx; opts = idx.map(i => ex.o[i]); correct = idx.indexOf(ex.a);
  }
  L._correct = correct;
  return `<div class="extitle">${fmt(ex.q)}</div>
    ${ex.code ? `<pre class="code">${hl(ex.code)}</pre>` : ''}
    ${opts.map((o, i) => `<button class="opt" data-i="${i}">${fmt(o)}</button>`).join('')}`;
}
function bindChoice(ex) {
  let sel = -1;
  const btns = app.querySelectorAll('.opt');
  btns.forEach(b => b.onclick = () => {
    btns.forEach(x => x.classList.remove('sel'));
    b.classList.add('sel'); sel = +b.dataset.i;
    checkBtn().disabled = false;
    SFX.select();
  });
  checkBtn().onclick = () => {
    const ok = sel === L._correct;
    btns[L._correct].classList.add('good');
    if (!ok) btns[sel].classList.add('bad');
    btns.forEach(b => b.style.pointerEvents = 'none');
    feedback(ok, ex, ex.t === 'tf' ? (ex.a ? 'Верно' : 'Неверно') : ex.o[ex.a]);
  };
}

/* ---------- fill (пропуск) ---------- */
function renderFill(ex) {
  L._fill = null;
  const bank = shuffle(ex.bank);
  L._bank = bank;
  const q = fmt(ex.q).replace('___', '<span class="gap" id="gap">&nbsp;</span>');
  return `<div class="extitle">Заполни пропуск</div>
    <div class="fill-q">${q}</div>
    ${ex.code ? `<pre class="code">${hl(ex.code)}</pre>` : ''}
    <div class="bank">${bank.map((t, i) => `<button class="tokenbtn" data-i="${i}">${esc(t)}</button>`).join('')}</div>`;
}
function bindFill(ex) {
  const gap = document.getElementById('gap');
  const toks = app.querySelectorAll('.tokenbtn');
  toks.forEach(b => b.onclick = () => {
    toks.forEach(x => x.classList.remove('used'));
    b.classList.add('used');
    L._fill = L._bank[+b.dataset.i];
    gap.textContent = L._fill;
    checkBtn().disabled = false;
    SFX.click();
  });
  gap.onclick = () => { L._fill = null; gap.innerHTML = '&nbsp;'; toks.forEach(x => x.classList.remove('used')); checkBtn().disabled = true; };
  checkBtn().onclick = () => {
    const ok = L._fill === ex.a;
    gap.style.color = ok ? 'var(--green)' : 'var(--red)';
    feedback(ok, ex, ex.a);
  };
}

/* ---------- match (пары) ---------- */
function renderMatch(ex) {
  const left = shuffle(ex.pairs.map((p, i) => ({ t: p[0], i })));
  const right = shuffle(ex.pairs.map((p, i) => ({ t: p[1], i })));
  L._mleft = left; L._mright = right; L._msolved = 0; L._mwrong = false;
  const cells = [];
  for (let r = 0; r < left.length; r++) {
    cells.push(`<button class="mopt" data-side="l" data-p="${left[r].i}">${fmt(left[r].t)}</button>`);
    cells.push(`<button class="mopt" data-side="r" data-p="${right[r].i}">${fmt(right[r].t)}</button>`);
  }
  return `<div class="extitle">${fmt(ex.q)}</div><div class="match-grid">${cells.join('')}</div>`;
}
function bindMatch(ex) {
  let selL = null, selR = null;
  const all = app.querySelectorAll('.mopt');
  function tryMatch() {
    if (!selL || !selR) return;
    const a = selL, b = selR; selL = selR = null;
    if (a.dataset.p === b.dataset.p) {
      [a, b].forEach(x => { x.classList.remove('sel'); x.classList.add('off'); });
      L._msolved++;
      vib(10); tone(880, 0, 0.08, { type: 'triangle', gain: 0.12 });
      if (L._msolved === ex.pairs.length) {
        feedback(!L._mwrong, ex, null, true); // пары: ошибка не отнимает сердце
      }
    } else {
      L._mwrong = true; L.mistakes++;
      [a, b].forEach(x => { x.classList.remove('sel'); x.classList.add('shake'); });
      vib(60);
      setTimeout(() => [a, b].forEach(x => x.classList.remove('shake')), 320);
    }
  }
  all.forEach(b => b.onclick = () => {
    const side = b.dataset.side;
    if (side === 'l') { if (selL) selL.classList.remove('sel'); selL = b; }
    else { if (selR) selR.classList.remove('sel'); selR = b; }
    b.classList.add('sel');
    SFX.select();
    tryMatch();
  });
  checkBtn().style.display = 'none';
}

/* ---------- order (порядок) ---------- */
function renderOrder(ex) {
  const bank = shuffle(ex.items.map((t, i) => ({ t, i })));
  L._obank = bank; L._osel = [];
  return `<div class="extitle">${fmt(ex.q)}</div>
    ${ex.code ? `<pre class="code">${hl(ex.code)}</pre>` : ''}
    <div class="slots" id="slots"></div>
    <div class="bank" id="obank">${bank.map((b, i) => `<button class="tokenbtn" data-i="${i}">${fmt(b.t)}</button>`).join('')}</div>`;
}
function bindOrder(ex) {
  const slots = document.getElementById('slots');
  const bank = document.getElementById('obank');
  function redraw() {
    slots.innerHTML = L._osel.map((s, k) => `<button class="tokenbtn" data-k="${k}">${k+1}. ${fmt(s.t)}</button>`).join('');
    slots.querySelectorAll('button').forEach(b => b.onclick = () => {
      const s = L._osel.splice(+b.dataset.k, 1)[0];
      bank.querySelector(`[data-i="${s.bi}"]`).classList.remove('used');
      redraw();
    });
    checkBtn().disabled = L._osel.length !== ex.items.length;
  }
  bank.querySelectorAll('button').forEach(b => b.onclick = () => {
    if (b.classList.contains('used')) return;
    b.classList.add('used');
    L._osel.push({ t: L._obank[+b.dataset.i].t, i: L._obank[+b.dataset.i].i, bi: +b.dataset.i });
    redraw();
    SFX.click();
  });
  checkBtn().onclick = () => {
    const ok = L._osel.every((s, k) => s.i === k);
    feedback(ok, ex, ex.items.map((t,i)=>`${i+1}. ${t}`).join('  →  '));
  };
  redraw();
}

function bindExercise(ex) {
  if (ex.t === 'c' || ex.t === 'tf') bindChoice(ex);
  else if (ex.t === 'f') bindFill(ex);
  else if (ex.t === 'm') bindMatch(ex);
  else if (ex.t === 'o') bindOrder(ex);
  else if (ex.t === 'in') bindInput(ex);
}

/* ---------- input (впиши ответ строкой) ---------- */
function renderInput(ex) {
  return `<div class="extitle">${fmt(ex.q)}</div>
    ${ex.code ? `<pre class="code">${hl(ex.code)}</pre>` : ''}
    <div class="in-tag">✍️ впиши ответ — без вариантов</div>
    <input class="answer-input ${ex.mono ? 'mono' : ''}" id="ansin" type="text" inputmode="text"
      autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"
      placeholder="${ex.ph ? esc(ex.ph) : 'Впиши ответ…'}">
    ${ex.hint ? `<div class="in-hint">💡 ${fmt(ex.hint)}</div>` : ''}`;
}
function normAns(s) {
  return String(s).toLowerCase().trim()
    .replace(/[«»"'`]/g, '')
    .replace(/\s+/g, ' ')
    .replace(/[.!?;,]+$/, '');
}
function matchAnswer(input, accepted) {
  const u = normAns(input);
  const list = Array.isArray(accepted) ? accepted : [accepted];
  return list.some(a => normAns(a) === u);
}
function bindInput(ex) {
  const inp = document.getElementById('ansin');
  const check = checkBtn();
  inp.addEventListener('input', () => { check.disabled = !inp.value.trim(); });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); if (inp.value.trim()) check.click(); }
  });
  check.onclick = () => {
    if (!inp.value.trim()) return;
    inp.disabled = true;
    const ok = matchAnswer(inp.value, ex.a);
    feedback(ok, ex, Array.isArray(ex.a) ? ex.a[0] : ex.a);
  };
  setTimeout(() => { try { inp.focus(); } catch (e) {} }, 60);
}
function checkBtn() { return document.getElementById('check'); }

/* ---------- проверка и фидбек ---------- */
function feedback(ok, ex, correctText, noHeart) {
  const exi = L.queue[L.pos];
  L.answered++;
  const bar = document.getElementById('cbar');
  if (ok) {
    L.solved.add(exi);
    if (!L.seenWrong.has(exi)) L.firstTry++;
    if (ex._gid && S.srs[ex._gid]) srsAdvance(ex._gid); // верный ответ отодвигает повтор
    vib(15); SFX.correct(); haptic('success');
    bar.className = 'checkbar ok';
    bar.innerHTML = `<div class="fb"><div class="fico">✅</div><div>
        <b class="ok-t">${['Отлично!','Верно!','Супер!','Именно так!','Красавчик!'][Math.floor(Math.random()*5)]}</b>
        ${ex.w ? `<p>${fmt(ex.w)}</p>` : ''}
      </div></div>
      <button class="btn" id="next">Дальше</button>`;
  } else {
    L.seenWrong.add(exi);
    if (!noHeart) L.mistakes++;
    if (!noHeart && !L.exam && !L.review) L.hearts--; // сердца теряем только в обычном уроке
    if (ex._gid) srsLapse(ex._gid); // ошибка ставит карточку в очередь повторений
    vib([60,40,60]); SFX.wrong(); haptic('error');
    if (!L.exam) L.queue.push(exi); // повторим в конце урока/повторения (на экзамене второго шанса нет)
    bar.className = 'checkbar no';
    bar.innerHTML = `<div class="fb"><div class="fico">❌</div><div>
        <b class="no-t">Неверно</b>
        ${correctText ? `<p><b>Правильный ответ:</b> ${fmt(correctText)}</p>` : ''}
        ${ex.w ? `<p>${fmt(ex.w)}</p>` : ''}
      </div></div>
      <button class="btn ${L.hearts <= 0 && !L.exam ? 'red' : 'blue'}" id="next">${L.hearts <= 0 && !L.exam ? 'Сердечки кончились…' : 'Дальше'}</button>`;
    const hb = document.querySelector('.hearts');
    if (hb && !L.exam && !L.review) hb.textContent = '❤️ ' + Math.max(0, L.hearts);
  }
  // обновить прогресс-бар
  const pb = document.querySelector('.pbar > div');
  if (pb) pb.style.width = progressPct() + '%';
  document.getElementById('next').onclick = () => {
    if (L.hearts <= 0 && !L.exam && !L.review) { failLesson(); return; }
    L.pos++;
    showExercise();
  };
  window.scrollTo(0, document.body.scrollHeight);
}

function failLesson() {
  SFX.fail(); haptic('error');
  const id = L.id; L = null;
  app.innerHTML = `<div class="endscr">
    <div class="big">💔</div>
    <h2 style="color:var(--red)">Сердечки закончились</h2>

    <button class="btn" id="retry">Попробовать снова</button>

  </div>`;
  document.getElementById('retry').onclick = () => startLesson(id);
  document.getElementById('th').onclick = () => openTheory(id, true);

}

function finishLesson() {
  const perfect = L.mistakes === 0 && L.seenWrong.size === 0;
  const xp = 10 + (perfect ? 5 : 0);
  const acc = Math.round(L.firstTry / L.ex.length * 100);
  if (L.exam) { finishExam(acc); return; }
  if (L.review) { finishReview(acc); return; }
  const before = computeXp(S);
  const replay = !!S.done[L.id];
  S.done[L.id] = true;
  if (perfect) S.perfect[L.id] = true;
  bumpStreak();
  save();
  const gained = computeXp(S) - before;       // 0 при переигровке уже пройденного урока
  const id = L.id; L = null;
  const lessonObj = ALL_LESSONS[lessonIndex(id)] && ALL_LESSONS[lessonIndex(id)].l;
  const hasPractice = ACTIVE.runLang === 'cpp' && lessonObj && lessonObj.practice && !S.practiceDone[id];
  app.innerHTML = `<div class="endscr">
    <div class="big">${perfect ? '🏅' : '🎉'}</div>
    <h2>Урок пройден!</h2>
    <div class="endcards">
      <div class="endcard" style="background:var(--gold)"><div class="in"><small style="color:var(--gold)">Опыт</small>⚡ +${gained} XP</div></div>
      <div class="endcard" style="background:var(--green)"><div class="in"><small style="color:var(--green)">Точность</small>🎯 ${acc}%</div></div>
      <div class="endcard" style="background:#ff9600"><div class="in"><small style="color:#ff9600">Стрик</small>🔥 ${S.streak}</div></div>
    </div>
    ${gained > 0 && perfect ? '<p style="color:var(--gold);font-weight:900;margin-bottom:20px">Без единой ошибки! +5 бонусных XP</p>' : ''}
    ${replay && gained === 0 ? '<p style="color:var(--mut);font-weight:700;margin-bottom:20px">Повторение пройденного — XP за него уже начислен 🙂</p>' : ''}
    ${hasPractice ? '<p style="color:var(--gold);font-weight:800;margin-bottom:14px">🎯 Закрепи на практике — напиши программу сам (+12 XP)</p>' : ''}
    ${hasPractice ? '<button class="btn" id="prac">🎯 Практическое задание</button><button class="btn ghost" id="cont" style="margin-top:10px">Пропустить</button>' : '<button class="btn" id="cont">Продолжить</button>'}
  </div>`;
  if (perfect) SFX.fanfare(); else SFX.complete();
  haptic('success');
  confetti();
  document.getElementById('cont').onclick = () => render();
  const pb = document.getElementById('prac'); if (pb) pb.onclick = () => openPractice(lessonObj);
}
function confetti() {
  const em = ['🎉','⭐','✨','💚','🧩','🏆'];
  for (let i = 0; i < 24; i++) {
    const s = document.createElement('span');
    s.className = 'confetti'; s.textContent = em[i % em.length];
    s.style.left = Math.random()*100 + 'vw';
    s.style.animationDuration = (1.4 + Math.random()*1.6) + 's';
    s.style.animationDelay = (Math.random()*0.5) + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 3500);
  }
}

function finishExam(acc) {
  L = null;

  bumpStreak();

  const verdict = acc >= 90 ? 'Блестяще! Ты готов(а) 🏆' : acc >= 75 ? 'Отлично, почти готов(а)!' : acc >= 50 ? 'Неплохо, но повтори слабые темы' : 'Стоит пройтись по урокам ещё раз';

function openEditor(opts) {
  document.body.classList.add('inlesson');
  app.innerHTML = `
    <div class="lesson-top">
      <button class="quit" id="quit">✕</button>
      <div style="font-weight:900;font-size:16px;flex:1;text-align:center">${esc(opts.title)}</div>
      <div style="width:30px"></div>
    </div>
    <div class="editor-wrap">
      <div class="editor-q">${fmt(opts.q).replace(/\n/g, '<br>')}</div>
      <textarea class="editor" id="editor" spellcheck="false">${esc(opts.starter)}</textarea>
      <div class="run-label">Вывод программы</div>
      <div class="run-out" id="out">— нажми «Запустить», чтобы скомпилировать и выполнить</div>
    </div>
    <div class="editor-bar">
      <button class="btn blue" id="run" style="flex:1">▶ Запустить</button>
      ${opts.expect != null ? '<button class="btn" id="check" style="flex:1">Проверить</button>' : ''}
    </div>`;
  document.getElementById('quit').onclick = () => { TAB = 'code'; render(); };
  const ed = document.getElementById('editor');
  const out = document.getElementById('out');
  const runBtn = document.getElementById('run');
  ed.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = ed.selectionStart, en = ed.selectionEnd;
      ed.value = ed.value.slice(0, s) + '    ' + ed.value.slice(en);
      ed.selectionStart = ed.selectionEnd = s + 4;
    }
  });
  runBtn.onclick = () => execCode(ed.value, out, runBtn);
  const chk = document.getElementById('check');
  if (chk) chk.onclick = async () => {
    const res = await execCode(ed.value, out, runBtn);
    if (!res) return;
    const got = (res.output || '').trim();
    const want = String(opts.expect).trim();
    if (!res.compile_error && got === want) {
      out.className = 'run-out good';
      const first = !S.codeDone[opts.id];
      S.codeDone[opts.id] = true;
      bumpStreak(); save();                      // save() пересчитает XP (+15 только при первом решении)
      out.textContent = (got || '(пусто)') + '\n\n✅ Верно! ' + (first ? '+15 XP' : 'Задача уже была решена.');
      SFX.fanfare(); haptic('success'); confetti(); vib(15);
    } else {
      out.className = 'run-out err';
      out.textContent = (res.compile_error ? res.compile_error.trim() + '\n\n' : '') +
        'Получено:\n' + (got || '(пусто)') + '\n\nОжидалось:\n' + want;
      vib([60, 40, 60]);
    }
  };
  window.scrollTo(0, 0);
}
async function execCode(code, outEl, btn) {
  outEl.className = 'run-out';
  outEl.innerHTML = '<span class="spin">⏳</span> Компиляция и запуск…';
  btn.disabled = true;
  try {
    const r = await fetch('/api/run', { method: 'POST', headers: tgHeaders({ 'Content-Type': 'application/json' }), body: JSON.stringify({ code, lang: ACTIVE.runLang }) });
    if (r.status === 429) { outEl.className = 'run-out err'; outEl.textContent = '⏳ Слишком часто — подожди пару секунд.'; return null; }
    const j = await r.json();
    if (!j.ok) { outEl.className = 'run-out err'; outEl.textContent = '⚠️ ' + (j.error || 'не удалось запустить'); return null; }
    let txt = '';
    if (j.compile_error) txt += j.compile_error.trim() + '\n';
    txt += (j.output || '');
    if (j.stderr) txt += (txt ? '\n' : '') + j.stderr;
    outEl.className = 'run-out' + (j.compile_error ? ' err' : '');
    outEl.textContent = txt.trim() || '(программа ничего не вывела)';
    return j;
  } catch (e) {
    outEl.className = 'run-out err';
    outEl.textContent = TG ? '⚠️ нет связи с сервером' : '⚠️ запуск кода доступен только в Telegram-приложении';
    return null;
  } finally { btn.disabled = false; }
}

/* ================== практика урока (редактор кода) ================== */
let PR = null; // { lesson, tries, hintsShown, solved }
function cedHL(code){
  return code.split('\n').map(ln=>{
    let t = esc(ln);
    const hold=[];
    const stash = h => String.fromCharCode(0xE100 + (hold.push(h)-1));
    t=t.replace(/\/\/.*/g, m=>stash('<span class="ck-com">'+m+'</span>'));
    t=t.replace(/&quot;[^]*?&quot;|"[^"]*"|'(?:\\.|[^'])'/g, m=>stash('<span class="ck-str">'+m+'</span>'));
    t=t.replace(/#\s*[a-z]+/g, m=>stash('<span class="ck-pre">'+m+'</span>'));
    t=t.replace(/&lt;[\w.\/+]+&gt;/g, m=>stash('<span class="ck-str">'+m+'</span>'));
    t=t.replace(/\b(return|if|else|for|while|do|switch|case|break|continue|using|namespace|struct|class|public|private|protected|true|false|const|new|delete|nullptr|virtual|override|template|typename|friend|explicit|static|operator|throw|try|catch|this)\b/g,'<span class="ck-kw">$1</span>');
    t=t.replace(/\b(int|double|float|char|void|bool|auto|unsigned|long|short|size_t|std|vector|string|map|stack)\b/g,'<span class="ck-ty">$1</span>');
    t=t.replace(/\b(\d+)\b/g,'<span class="ck-num">$1</span>');
    t=t.replace(/\b([a-zA-Z_]\w*)(\s*\()/g,'<span class="ck-fn">$1</span>$2');
    t=t.replace(/[-]/g, c=>hold[c.charCodeAt(0)-0xE100]);
    return t || '&nbsp;';
  }).join('\n');
}
function openPractice(lesson){
  PR = { lesson, tries: 0, hintsShown: 0, solved: !!S.practiceDone[lesson.id] };
  document.body.classList.add('inlesson');
  app.innerHTML = `
    <div class="lesson-top">
      <button class="quit" id="pquit">✕</button>
      <div style="font-weight:900;font-size:16px;flex:1;text-align:center">🎯 Практика · ${esc(lesson.title)}</div>
      <div style="width:30px"></div>
    </div>
    <div class="prac-wrap">
      <div class="prac-tag">🎯 напиши код сам · без сердечек</div>
      <div class="prac-goal">${lesson.practice.goal}</div>
      <div class="ced">
        <div class="ced-gut" id="pgut"></div>
        <div class="ced-area"><pre id="phl"></pre><textarea id="pcode" spellcheck="false" autocapitalize="off" autocomplete="off" autocorrect="off"></textarea></div>
      </div>
      <div class="prac-out" id="pout">— напиши программу и нажми «Запустить и проверить»</div>
      <div id="phint"></div>
    </div>
    <div class="prac-bar" id="pbar"></div>`;
  document.getElementById('pquit').onclick = () => { PR=null; render(); };
  const ta=document.getElementById('pcode'), pre=document.getElementById('phl'), gut=document.getElementById('pgut');
  ta.value = lesson.practice.starter || '';
  const draw=()=>{ pre.innerHTML=cedHL(ta.value); const n=ta.value.split('\n').length; let g=''; for(let i=1;i<=n;i++)g+='<div>'+i+'</div>'; gut.innerHTML='<div class="gi">'+g+'</div>'; sync(); };
  const sync=()=>{ pre.scrollTop=ta.scrollTop; pre.scrollLeft=ta.scrollLeft; const gi=gut.firstElementChild; if(gi) gi.style.transform='translateY('+(-ta.scrollTop)+'px)'; };
  ta.addEventListener('input', draw);
  ta.addEventListener('scroll', sync);
  ta.addEventListener('keydown', e=>{ if(e.key==='Tab'){ e.preventDefault(); const s=ta.selectionStart,en=ta.selectionEnd; ta.value=ta.value.slice(0,s)+'    '+ta.value.slice(en); ta.selectionStart=ta.selectionEnd=s+4; draw(); } });
  draw();
  renderPracBar();
  window.scrollTo(0,0);
}
function renderPracBar(){
  const bar=document.getElementById('pbar'); if(!bar) return;
  const showSol = PR.tries>=2 || PR.hintsShown>=(PR.lesson.practice.hints||[]).length;
  bar.innerHTML = `<button class="btn run" id="pcheck">▶ Запустить и проверить</button>
    <div class="row">
      <button class="btn ghost" id="phintbtn">💡 Подсказка</button>
      ${showSol?'<button class="btn ghost" id="psol">📖 Решение</button>':''}
    </div>` + (PR.solved?'<button class="btn" id="pnext">Продолжить →</button>':'');
  bar.querySelector('#pcheck').onclick = runPracticeCheck;
  bar.querySelector('#phintbtn').onclick = showNextHint;
  const ps=bar.querySelector('#psol'); if(ps) ps.onclick=showSolution;
  const pn=bar.querySelector('#pnext'); if(pn) pn.onclick=()=>{ PR=null; render(); };
}
function showNextHint(){
  const hints=PR.lesson.practice.hints||[];
  if(PR.hintsShown>=hints.length){ document.getElementById('phint').innerHTML='<div class="prac-hint">Подсказки кончились — загляни в 📖 Решение.</div>'; renderPracBar(); return; }
  PR.hintsShown++;
  let html=''; for(let i=0;i<PR.hintsShown;i++) html+='<div class="prac-hint"><b>Подсказка '+(i+1)+':</b> '+hints[i]+'</div>';
  document.getElementById('phint').innerHTML=html;
  renderPracBar();
}
function showSolution(){
  const ta=document.getElementById('pcode');
  ta.value=PR.lesson.practice.solution||'';
  ta.dispatchEvent(new Event('input'));
  document.getElementById('phint').innerHTML='<div class="prac-hint">📖 Вот рабочее решение. Разбери его и нажми «Запустить и проверить», чтобы закрепить.</div>';
}
async function runPracticeCheck(){
  const pr=PR.lesson.practice, out=document.getElementById('pout');
  const btn=document.getElementById('pcheck'); btn.disabled=true; btn.innerHTML='<span class="spin">⏳</span> Проверяю…';
  out.className='prac-out'; out.textContent='⏳ Компиляция и запуск…';
  try{
    const r=await fetch('/api/run',{method:'POST',headers:tgHeaders({'Content-Type':'application/json'}),body:JSON.stringify({code:document.getElementById('pcode').value,lang:'cpp',stdin:pr.stdin||''})});
    if(r.status===429){ out.className='prac-out err'; out.textContent='⏳ Слишком часто — подожди пару секунд.'; return; }
    if(r.status===503){ out.className='prac-out err'; out.textContent='⏳ Компилятор сейчас занят, попробуй ещё раз через секунду.'; return; }
    const j=await r.json();
    if(!j.ok){ out.className='prac-out err'; out.textContent='⚠️ '+(j.error||'не удалось запустить'); return; }
    const cerr=(j.compile_error||'').trim(), got=(j.output||'').trim(), exp=String(pr.expect).trim();
    if(cerr){
      PR.tries++;
      out.className='prac-out err'; out.textContent='⛔ Не компилируется:\n'+cerr;
      nudge();
    } else if(got===exp || got.includes(exp)){
      out.className='prac-out ok'; out.textContent=(got||'(пусто)')+'\n\n✅ Верно! Практика засчитана.';
      if(!S.practiceDone[PR.lesson.id]){ S.practiceDone[PR.lesson.id]=true; bumpStreak(); save(); }
      PR.solved=true;
      SFX.fanfare(); haptic('success'); confetti();
      renderPracBar();
    } else {
      PR.tries++;
      out.className='prac-out err'; out.textContent='Твой вывод:\n'+(got||'(пусто)')+'\n\nОжидалось:\n'+exp;
      nudge();
    }
  }catch(e){ out.className='prac-out err'; out.textContent='⚠️ нет связи с сервером'; }
  finally{ const b=document.getElementById('pcheck'); if(b){ b.disabled=false; b.innerHTML='▶ Запустить и проверить'; } }
}
// мягко подсказываем (не отнимая «жизни»): автоматически открываем следующую подсказку
function nudge(){
  const hints=PR.lesson.practice.hints||[];
  if(PR.hintsShown<hints.length) showNextHint(); else renderPracBar();
}

render();
pullProgress();
